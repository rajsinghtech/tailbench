apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-echo
  namespace: tailbench
  labels:
    app.kubernetes.io/part-of: tailbench-l7
    app: bench-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bench-echo
  template:
    metadata:
      labels:
        app: bench-echo
        app.kubernetes.io/part-of: tailbench-l7
    spec:
      containers:
      - name: fortio
        image: fortio/fortio:latest
        args: ["server"]
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8079
          name: grpc
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: "2"
            memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-baseline
  namespace: tailbench
  labels:
    app.kubernetes.io/part-of: tailbench-l7
    app: bench-baseline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bench-baseline
  template:
    metadata:
      labels:
        app: bench-baseline
        app.kubernetes.io/part-of: tailbench-l7-baseline
    spec:
      containers:
      - name: tools
        image: ubuntu:24.04
        command: ["/bin/bash", "-c"]
        args:
        - |
          apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
          ARCH=$(dpkg --print-architecture)
          curl -fsSL "https://github.com/fortio/fortio/releases/download/v1.75.0/fortio-linux_${ARCH}-1.75.0.tgz" | tar xz --strip-components=2 -C /usr/local/bin usr/bin/fortio
          chmod +x /usr/local/bin/fortio
          echo "fortio ready"
          sleep infinity
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
