name: Run Benchmarks

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Cloud provider"
        type: choice
        options:
          - gcp
          - aws
          - azure
        default: gcp
      family:
        description: "Instance family (provider-dependent, or 'all')"
        type: string
        default: all
      filter:
        description: "Instance filter regex (optional)"
        required: false
        default: ""
      create_tailnet:
        description: "Create ephemeral tailnet for the run"
        type: boolean
        default: true
      audience:
        description: "Audience for OIDC token (if using OIDC auth)"
        required: false
        default: ""
      client_id:
        description: "Client ID for OIDC exchange (if using OIDC auth)"
        required: false
        default: ""
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

permissions:
  id-token: write
  contents: write
  pages: write

concurrency:
  group: benchmarks
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # GCP auth (only when provider is gcp)
      - name: Authenticate to GCP
        if: inputs.provider == 'gcp' || inputs.provider == ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        if: inputs.provider == 'gcp' || inputs.provider == ''
        uses: google-github-actions/setup-gcloud@v2

      # AWS auth (only when provider is aws)
      - name: Configure AWS credentials
        if: inputs.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Setup AWS SSH key
        if: inputs.provider == 'aws'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/tailbench.pem
          chmod 600 ~/.ssh/tailbench.pem

      # Azure auth (only when provider is azure)
      - name: Azure login
        if: inputs.provider == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Azure SSH key
        if: inputs.provider == 'azure'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_PRIVATE_KEY }}" > ~/.ssh/tailbench
          echo "${{ secrets.AZURE_SSH_PUBLIC_KEY }}" > ~/.ssh/tailbench.pub
          chmod 600 ~/.ssh/tailbench

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - name: Determine auth method and get access token
        id: auth
        run: |
          if [[ -n "${{ inputs.audience }}" && -n "${{ inputs.client_id }}" ]]; then
            echo "Using OIDC authentication"
            JWT=$(curl -sH "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${{ inputs.audience }}" | jq -r '.value')
            echo "::add-mask::$JWT"
            # Exchange OIDC token
            RESPONSE=$(curl -s -X POST https://api.tailscale.com/api/v2/oauth/token-exchange \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "client_id=${{ inputs.client_id }}" \
              -d "subject_token=$JWT" \
              -d "subject_token_type=urn:ietf:params:oauth:token-type:id-token" \
              -d "grant_type=urn:ietf:params:oauth:grant-type:token-exchange")
            echo "oauth_client_id=${{ inputs.client_id }}" >> $GITHUB_OUTPUT
            echo "using_oidc=true" >> $GITHUB_OUTPUT
          else
            echo "Using OAuth client credentials"
            echo "oauth_client_id=${{ secrets.TS_OAUTH_CLIENT_ID }}" >> $GITHUB_OUTPUT
            echo "oauth_client_secret=${{ secrets.TS_OAUTH_CLIENT_SECRET }}" >> $GITHUB_OUTPUT
            echo "using_oidc=false" >> $GITHUB_OUTPUT
          fi

      - name: Run benchmarks
        env:
          CLOUD_PROVIDER: ${{ inputs.provider || 'gcp' }}
          TS_OAUTH_CLIENT_ID: ${{ steps.auth.outputs.oauth_client_id || secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_CLIENT_SECRET: ${{ steps.auth.outputs.oauth_client_secret || secrets.TS_OAUTH_CLIENT_SECRET }}
          TS_TAG: ${{ secrets.TS_TAG || 'tag:bench' }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_ZONE: ${{ secrets.GCP_ZONE || 'us-central1-a' }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          AWS_KEY_NAME: ${{ secrets.AWS_KEY_NAME || 'tailbench' }}
          AWS_SSH_KEY_PATH: ~/.ssh/tailbench.pem
          AZURE_LOCATION: ${{ secrets.AZURE_LOCATION || 'eastus' }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP || 'tailbench-rg' }}
          AZURE_SSH_KEY_PATH: ~/.ssh/tailbench
          AZURE_SSH_PUB_KEY_PATH: ~/.ssh/tailbench.pub
        run: |
          ARGS="--provider ${{ inputs.provider || 'gcp' }} --family ${{ inputs.family || 'all' }}"
          if [[ -n "${{ inputs.filter }}" ]]; then
            ARGS="$ARGS --filter '${{ inputs.filter }}'"
          fi
          if [[ "${{ inputs.create_tailnet }}" == "true" ]]; then
            ARGS="$ARGS --create-tailnet"
          fi
          eval "./scripts/orchestrate.sh $ARGS"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add {gcp,aws,azure}/*/results/*.json website/data.generated.js 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new results to commit"
          else
            git commit -m "Update benchmark results $(date +%Y-%m-%d)"
            git push
          fi

  deploy:
    needs: benchmark
    uses: ./.github/workflows/deploy-pages.yml
