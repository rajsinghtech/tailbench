<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tailbench — Tailscale Network Performance Benchmarks</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #ffffff;
  --bg-secondary: #faf9f8;
  --bg-tertiary: #f7f5f4;
  --bg-card: #ffffff;
  --bg-hover: #f7f5f4;
  --bg-bar: #eeebea;
  --text-primary: #2e2d2d;
  --text-secondary: #706e6d;
  --text-muted: #afacab;
  --border: #dad6d5;
  --border-subtle: #eeebea;
  --accent: #4b70cc;
  --accent-soft: rgba(75, 112, 204, 0.08);
  --accent-bar: rgba(75, 112, 204, 0.15);
  --green: #09825d;
  --green-bg: rgba(9, 130, 93, 0.1);
  --yellow: #bb5504;
  --yellow-bg: rgba(187, 85, 4, 0.1);
  --red: #d04841;
  --red-bg: rgba(208, 72, 65, 0.1);
  --purple: #995fc3;
  --purple-bg: rgba(153, 95, 195, 0.1);
  --shadow-sm: 0 4px 8px 0 rgba(24, 23, 23, 0.02);
  --shadow-md: 0 4px 8px 0 rgba(24, 23, 23, 0.08);
  --shadow-lg: 0 4px 16px 0 rgba(24, 23, 23, 0.16);
  --radius: 8px;
  --radius-lg: 16px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, Consolas, monospace;
  --transition: 200ms ease;
  --indigo: #5a82de;
  --indigo-soft: rgba(90, 130, 222, 0.13);
  --amber: #d97917;
  --emerald: #1ea672;
}

[data-theme="dark"] {
  --bg-primary: #1f1e1e;
  --bg-secondary: #232222;
  --bg-tertiary: #2e2d2d;
  --bg-card: #232222;
  --bg-hover: #2e2d2d;
  --bg-bar: #444342;
  --text-primary: #f7f5f4;
  --text-secondary: #afacab;
  --text-muted: #706e6d;
  --border: #444342;
  --border-subtle: #2e2d2d;
  --accent: #85aaf5;
  --accent-soft: rgba(133, 170, 245, 0.1);
  --accent-bar: rgba(133, 170, 245, 0.18);
  --green: #85d996;
  --green-bg: rgba(133, 217, 150, 0.12);
  --yellow: #efc078;
  --yellow-bg: rgba(239, 192, 120, 0.12);
  --red: #ffb1ab;
  --red-bg: rgba(255, 177, 171, 0.12);
  --purple: #e3c3fa;
  --purple-bg: rgba(227, 195, 250, 0.12);
  --shadow-sm: 0 4px 8px 0 rgba(0, 0, 0, 0.15);
  --shadow-md: 0 4px 8px 0 rgba(0, 0, 0, 0.25);
  --shadow-lg: 0 4px 16px 0 rgba(0, 0, 0, 0.35);
  --indigo: #adc7fc;
  --indigo-soft: rgba(173, 199, 252, 0.18);
  --amber: #efc078;
  --emerald: #85d996;
}

html { font-size: 16px; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  letter-spacing: -0.01em;
  transition: background var(--transition), color var(--transition);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Layout */
.container { max-width: 1440px; margin: 0 auto; padding: 0 24px; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  padding: 32px 0 28px;
  transition: background var(--transition);
}
.header-inner { display: flex; justify-content: space-between; align-items: flex-start; }
.header-text h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--text-primary);
}
.header-text h1 span { color: var(--accent); }
.header-text p {
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin-top: 4px;
  letter-spacing: -0.01em;
}
.theme-toggle {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 14px;
  cursor: pointer;
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all var(--transition);
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--shadow-sm); }
.theme-toggle svg { width: 15px; height: 15px; }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin: 24px 0;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
}
.stat-card:hover { box-shadow: var(--shadow-md); }
.stat-label {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.stat-value {
  font-family: var(--font-mono);
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text-primary);
}
.stat-value small {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-left: 4px;
}
.stat-sub {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* Insights panel */
.insights-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 24px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.insights-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  overflow-x: auto;
}
.insights-tab {
  padding: 12px 20px;
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
  white-space: nowrap;
  font-family: var(--font-sans);
  letter-spacing: -0.01em;
}
.insights-tab:hover { color: var(--text-primary); }
.insights-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}
.insights-canvas-wrap {
  position: relative;
  padding: 20px;
  height: 380px;
}
.insights-canvas-wrap canvas {
  width: 100% !important;
  height: 100% !important;
}
/* Heatmap container (not a canvas chart) */
#heatmapContainer {
  width: 100%;
  height: 100%;
  overflow: auto;
}
.heatmap-grid {
  display: grid;
  gap: 3px;
  width: 100%;
  height: 100%;
  align-content: start;
}
.heatmap-cell {
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 100ms ease, box-shadow 100ms ease;
  min-height: 36px;
}
.heatmap-cell:hover {
  transform: scale(1.05);
  box-shadow: var(--shadow-md);
  z-index: 1;
}
.heatmap-cell.header-cell {
  background: none;
  cursor: default;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-muted);
}
.heatmap-cell.header-cell:hover {
  transform: none;
  box-shadow: none;
}
.heatmap-cell.empty-cell {
  background: var(--bg-tertiary);
  color: var(--text-muted);
  cursor: default;
  opacity: 0.4;
}
.heatmap-cell.empty-cell:hover { transform: none; box-shadow: none; }

/* Row highlight for chart click */
.data-row.chart-highlight {
  animation: chartPulse 1.5s ease;
}
@keyframes chartPulse {
  0% { background: var(--accent-soft); }
  100% { background: transparent; }
}

/* Filters */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.filter-bar label {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.pill-group { display: flex; gap: 4px; }
.pill {
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* Table */
.table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow-x: auto;
  box-shadow: var(--shadow-sm);
}
.table-wrap:hover { box-shadow: var(--shadow-md); }
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 10px 10px;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  text-align: left;
  cursor: pointer;
  user-select: none;
  transition: color var(--transition);
  white-space: nowrap;
  position: relative;
}
thead th:hover { color: var(--accent); }
thead th .sort-arrow {
  display: inline-block;
  margin-left: 4px;
  font-size: 0.65rem;
  opacity: 0.4;
  transition: opacity var(--transition);
}
thead th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
tbody tr {
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: background var(--transition);
}
tbody tr:hover { background: var(--bg-hover); }
tbody tr:last-child { border-bottom: none; }
td {
  padding: 9px 10px;
  font-size: 0.85rem;
  vertical-align: middle;
}
td.mono {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  font-variant-numeric: tabular-nums;
}
.instance-type {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--text-primary);
}
.instance-family-tag {
  display: inline-block;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 2px 5px;
  border-radius: 4px;
  margin-left: 6px;
  background: var(--accent-soft);
  color: var(--accent);
}
.cloud-tag {
  display: inline-block;
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--bg-tertiary);
  color: var(--text-muted);
}
.ena-tag {
  display: inline-block;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 2px 5px;
  border-radius: 4px;
  margin-left: 6px;
  background: var(--yellow-bg);
  color: var(--yellow);
}
.k8s-tag {
  display: inline-block;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 2px 5px;
  border-radius: 4px;
  margin-left: 6px;
  background: var(--yellow-bg);
  color: var(--yellow);
}
[data-theme="dark"] .k8s-tag {
  background: var(--yellow-bg);
  color: var(--yellow);
}
.mode-tag {
  display: inline-block;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 2px 5px;
  border-radius: 4px;
  margin-left: 6px;
}
.mode-l4 { background: rgba(37, 99, 235, 0.1); color: var(--accent); }
.mode-l7 { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }
.mode-tsnet { background: rgba(16, 185, 129, 0.1); color: #10b981; }
[data-theme="dark"] .mode-l7 { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
[data-theme="dark"] .mode-tsnet { background: rgba(16, 185, 129, 0.15); color: #34d399; }
.env-tag {
  display: inline-block;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 2px 5px;
  border-radius: 4px;
  margin-left: 6px;
}
.env-tag.vm {
  background: rgba(75, 112, 204, 0.1);
  color: var(--accent);
}
.env-tag.container {
  background: var(--purple-bg);
  color: var(--purple);
}
[data-theme="dark"] .env-tag.vm {
  background: rgba(133, 170, 245, 0.15);
  color: var(--accent);
}
[data-theme="dark"] .env-tag.container {
  background: var(--purple-bg);
  color: var(--purple);
}

/* BW bar cell */
.bw-cell { position: relative; }
.bw-bar {
  position: absolute;
  left: 4px; top: 5px; bottom: 5px;
  border-radius: 4px;
  transition: width 400ms ease;
}
.bw-bar.baseline { background: var(--accent-bar); }
.bw-bar.tailscale { background: var(--indigo-soft); }
.bw-val { position: relative; z-index: 1; }

/* Overhead badge */
.overhead-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  font-weight: 600;
}
.overhead-green { background: var(--green-bg); color: var(--green); }
.overhead-yellow { background: var(--yellow-bg); color: var(--yellow); }
.overhead-red { background: var(--red-bg); color: var(--red); }

/* Actions */
.btn-details {
  padding: 5px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.btn-details:hover { border-color: var(--accent); color: var(--accent); }

/* Detail row */
.detail-row td { padding: 0; }
.detail-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 350ms ease, padding 200ms ease;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-subtle);
}
.detail-row.open .detail-content {
  max-height: 800px;
  padding: 20px 24px;
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.detail-section h4 {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.detail-meta {
  display: flex;
  gap: 20px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.detail-meta-item {
  font-size: 0.78rem;
  color: var(--text-secondary);
}
.detail-meta-item strong {
  color: var(--text-primary);
  font-weight: 600;
}

/* Mini tables */
.mini-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
.mini-table th {
  padding: 6px 10px;
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  text-align: left;
  cursor: default;
  background: transparent;
}
.mini-table td {
  padding: 6px 10px;
  font-family: var(--font-mono);
  font-size: 0.76rem;
  border-bottom: 1px solid var(--border-subtle);
}
.mini-table tr:last-child td { border-bottom: none; }

/* MTR hop bars */
.mtr-comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.mtr-column h5 {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.mtr-hop {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
  font-size: 0.75rem;
}
.mtr-hop-num {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  min-width: 18px;
}
.mtr-hop-host {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-secondary);
  min-width: 100px;
}
.mtr-hop-bar-wrap {
  flex: 1;
  height: 16px;
  background: var(--bg-bar);
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}
.mtr-hop-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 400ms ease;
}
.mtr-hop-bar.baseline-bar { background: var(--accent); opacity: 0.6; }
.mtr-hop-bar.ts-bar { background: var(--indigo); opacity: 0.6; }
.mtr-hop-val {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  min-width: 52px;
  text-align: right;
}

/* Footer */
footer {
  border-top: 1px solid var(--border);
  padding: 24px 0;
  margin-top: 40px;
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-muted);
}
footer a {
  color: var(--accent);
  text-decoration: none;
}
footer a:hover { text-decoration: underline; }

/* Responsive */
@media (max-width: 900px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .detail-grid { grid-template-columns: 1fr; }
  .mtr-comparison { grid-template-columns: 1fr; }
  .insights-canvas-wrap { height: 300px; }
}
@media (max-width: 600px) {
  html { font-size: 14px; }
  .stats-row { grid-template-columns: 1fr; }
  .container { padding: 0 16px; }
  header { padding: 20px 0 16px; }
  .header-inner { flex-direction: column; gap: 12px; }
  .table-wrap { overflow-x: auto; }
  table { min-width: 700px; }
  .insights-canvas-wrap { height: 250px; }
  .insights-tab { padding: 8px 14px; font-size: 0.75rem; }
}
</style>
</head>
<body>

<header>
  <div class="container header-inner">
    <div class="header-text">
      <h1>Tail<span>bench</span></h1>
      <p>Tailscale Network Performance Benchmarks</p>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span id="themeLabel">Light</span>
    </button>
  </div>
</header>

<main class="container">
  <div class="stats-row" id="statsRow"></div>

  <div class="insights-panel" id="insightsPanel">
    <div class="insights-tabs" id="insightsTabs"></div>
    <div class="insights-canvas-wrap" id="insightsBody">
      <canvas id="insightsCanvas"></canvas>
      <div id="heatmapContainer" style="display:none"></div>
    </div>
  </div>

  <div class="filter-bar" id="providerFilterBar">
    <label>Provider</label>
    <div class="pill-group" id="providerFilter"></div>
  </div>

  <div class="filter-bar">
    <label>Family</label>
    <div class="pill-group" id="familyFilter"></div>
  </div>

  <div class="filter-bar" id="envFilterBar" style="display:none">
    <label>Environment</label>
    <div class="pill-group" id="envFilter"></div>
  </div>

  <div class="filter-bar" id="k8sFilterBar" style="display:none">
    <label>Show</label>
    <div class="pill-group" id="k8sFilter"></div>
  </div>

  <div class="filter-bar" id="modeFilterBar" style="display:none">
    <label>Mode</label>
    <div class="pill-group" id="modeFilter"></div>
  </div>

  <div class="table-wrap">
    <table id="mainTable">
      <thead id="tableHead">
        <tr></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>

<footer>
  <div class="container">
    Tailbench &mdash; open-source network benchmarking for Tailscale.
    <a href="https://github.com/rajsinghtech/tailbench" target="_blank" rel="noopener">GitHub</a>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="data.generated.js"></script>
<script>
(function() {
  // --- CSS variable reader ---
  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  // --- vCPU resolver ---
  function getVCPUs(d) {
    if (d.vcpus) return d.vcpus;
    var type = d.instance_type;
    var m = type.match(/(\d+)$/);
    if (m) return parseInt(m[1], 10);
    var awsSize = type.split('.')[1];
    if (awsSize) {
      var awsMap = {xlarge:4,'2xlarge':8,'4xlarge':16,'8xlarge':32,'12xlarge':48,'16xlarge':64,'24xlarge':96};
      if (awsMap[awsSize]) return awsMap[awsSize];
    }
    var azNum = type.match(/_[A-Z](\d+)/);
    if (azNum) return parseInt(azNum[1], 10);
    return 0;
  }

  // --- Provider colors ---
  var providerColors = {
    gcp: function() { return cssVar('--accent'); },
    aws: function() { return cssVar('--amber'); },
    azure: function() { return cssVar('--emerald'); }
  };
  function getProviderColor(d) {
    var p = (d.cloud_provider || 'gcp').toLowerCase();
    return providerColors[p] ? providerColors[p]() : cssVar('--accent');
  }

  // --- State ---
  var state = {
    provider: 'all',
    family: 'all',
    sortKey: 'ts_bw',
    sortDir: 'desc',
    expanded: null,
    filterK8s: false,
    filterEnv: 'all',
    activeTab: 'throughput',
    mode: 'all'
  };

  // --- Detect providers ---
  function getProviders() {
    var p = {};
    TAILBENCH_DATA.forEach(function(d) { p[(d.cloud_provider || 'gcp').toUpperCase()] = true; });
    return Object.keys(p).sort();
  }

  var allProviders = getProviders();
  var multiProvider = allProviders.length > 1;
  var hasSingle = TAILBENCH_DATA.some(function(d) { return d.baseline_tcp_single; });
  var hasK8s = TAILBENCH_DATA.some(function(d) { return d.k8s_pod_to_vm_tcp; });
  var allModes = {};
  TAILBENCH_DATA.forEach(function(d) { if (d.transport_mode) allModes[d.transport_mode] = true; });
  var hasModes = Object.keys(allModes).length > 1;
  var hasFortio = TAILBENCH_DATA.some(function(d) { return d.fortio_result; });
  var hasContainer = TAILBENCH_DATA.some(function(d) { return d.environment === 'container'; });
  var hasVM = TAILBENCH_DATA.some(function(d) { return !d.environment || d.environment === 'vm'; });
  var hasMultiEnv = hasContainer && hasVM;

  // --- Max BW ---
  var maxBW = 0;
  TAILBENCH_DATA.forEach(function(d) {
    if (!d.baseline_tcp || !d.tailscale_tcp) return;
    var b = d.baseline_tcp.summary.bandwidth_mbps_avg;
    var t = d.tailscale_tcp.summary.bandwidth_mbps_avg;
    if (b > maxBW) maxBW = b;
    if (t > maxBW) maxBW = t;
    if (d.baseline_tcp_single) {
      var bs = d.baseline_tcp_single.summary.bandwidth_mbps_avg;
      if (bs > maxBW) maxBW = bs;
    }
    if (d.tailscale_tcp_single) {
      var ts = d.tailscale_tcp_single.summary.bandwidth_mbps_avg;
      if (ts > maxBW) maxBW = ts;
    }
  });

  // --- Theme ---
  function getSystemTheme() {
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var sun = document.getElementById('themeIconSun');
    var moon = document.getElementById('themeIconMoon');
    var label = document.getElementById('themeLabel');
    if (theme === 'dark') {
      sun.style.display = 'none';
      moon.style.display = 'block';
      label.textContent = 'Dark';
    } else {
      sun.style.display = 'block';
      moon.style.display = 'none';
      label.textContent = 'Light';
    }
  }
  var savedTheme = localStorage.getItem('tailbench-theme') || getSystemTheme();
  applyTheme(savedTheme);
  document.getElementById('themeToggle').addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('tailbench-theme', next);
    applyTheme(next);
    renderChart();
  });

  // --- Hash state ---
  function readHash() {
    var h = location.hash.replace('#', '');
    if (!h) return;
    var params = {};
    h.split('&').forEach(function(pair) {
      var kv = pair.split('=');
      if (kv.length === 2) params[kv[0]] = decodeURIComponent(kv[1]);
    });
    if (params.provider) state.provider = params.provider;
    if (params.family) state.family = params.family;
    if (params.sort) state.sortKey = params.sort;
    if (params.dir) state.sortDir = params.dir;
    if (params.k8s) state.filterK8s = params.k8s === '1';
    if (params.env) state.filterEnv = params.env;
    if (params.tab) state.activeTab = params.tab;
    if (params.mode) state.mode = params.mode;
  }
  function writeHash() {
    var parts = [];
    if (state.provider !== 'all') parts.push('provider=' + encodeURIComponent(state.provider));
    if (state.family !== 'all') parts.push('family=' + encodeURIComponent(state.family));
    if (state.sortKey !== 'ts_bw') parts.push('sort=' + encodeURIComponent(state.sortKey));
    if (state.sortDir !== 'desc') parts.push('dir=' + encodeURIComponent(state.sortDir));
    if (state.filterK8s) parts.push('k8s=1');
    if (state.filterEnv !== 'all') parts.push('env=' + encodeURIComponent(state.filterEnv));
    if (state.activeTab !== 'throughput') parts.push('tab=' + encodeURIComponent(state.activeTab));
    if (state.mode !== 'all') parts.push('mode=' + encodeURIComponent(state.mode));
    location.hash = parts.length ? parts.join('&') : '';
  }
  readHash();

  // --- Data filters ---
  function getProviderData() {
    if (state.provider === 'all') return TAILBENCH_DATA.slice();
    return TAILBENCH_DATA.filter(function(d) {
      return (d.cloud_provider || 'gcp').toLowerCase() === state.provider;
    });
  }

  function getFilteredData() {
    var data = getProviderData();
    if (state.family !== 'all') data = data.filter(function(d) { return d.instance_family.toLowerCase() === state.family; });
    if (state.filterK8s) data = data.filter(function(d) { return d.k8s_pod_to_vm_tcp; });
    if (state.mode !== 'all') data = data.filter(function(d) { return d.transport_mode === state.mode; });
    if (state.filterEnv !== 'all') {
      data = data.filter(function(d) {
        var env = d.environment || 'vm';
        return env === state.filterEnv;
      });
    }
    return data;
  }

  // --- Highlight table row from chart click ---
  function highlightInstance(instanceKey) {
    var row = document.querySelector('.data-row[data-instance="' + instanceKey + '"]');
    if (!row) return;
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    row.classList.remove('chart-highlight');
    void row.offsetWidth;
    row.classList.add('chart-highlight');
    // expand the detail row
    state.expanded = instanceKey;
    renderTable();
    // re-scroll after re-render
    var row2 = document.querySelector('.data-row[data-instance="' + instanceKey + '"]');
    if (row2) {
      row2.scrollIntoView({ behavior: 'smooth', block: 'center' });
      row2.classList.add('chart-highlight');
    }
  }

  // ===== CHART SYSTEM =====
  var activeChart = null;
  var chartTabs = [
    { id: 'throughput', label: 'Throughput vs vCPU' },
    { id: 'heatmap', label: 'Overhead Heatmap' },
    { id: 'efficiency', label: 'Efficiency (Gbps/vCPU)' }
  ];
  if (hasFortio) {
    chartTabs.push({ id: 'l7qps', label: 'L7 QPS Comparison' });
    chartTabs.push({ id: 'l7latency', label: 'L7 Latency' });
  }
  if (hasMultiEnv) {
    chartTabs.push({ id: 'environment', label: 'Container vs VM' });
  }
  if (multiProvider) {
    chartTabs.push({ id: 'radar', label: 'Provider Comparison' });
  }

  function renderInsightsTabs() {
    var html = '';
    chartTabs.forEach(function(t) {
      html += '<button class="insights-tab' + (state.activeTab === t.id ? ' active' : '') + '" data-tab="' + t.id + '">' + t.label + '</button>';
    });
    document.getElementById('insightsTabs').innerHTML = html;
    document.querySelectorAll('.insights-tab').forEach(function(btn) {
      btn.addEventListener('click', function() {
        state.activeTab = this.getAttribute('data-tab');
        writeHash();
        renderInsightsTabs();
        renderChart();
      });
    });
  }

  function renderChart() {
    if (activeChart) { activeChart.destroy(); activeChart = null; }
    var canvas = document.getElementById('insightsCanvas');
    var heatmapEl = document.getElementById('heatmapContainer');

    if (state.activeTab === 'heatmap') {
      canvas.style.display = 'none';
      heatmapEl.style.display = '';
      renderHeatmap();
    } else {
      canvas.style.display = '';
      heatmapEl.style.display = 'none';
      if (state.activeTab === 'throughput') renderThroughputChart();
      else if (state.activeTab === 'efficiency') renderEfficiencyChart();
      else if (state.activeTab === 'l7qps') renderL7QPSChart();
      else if (state.activeTab === 'l7latency') renderL7LatencyChart();
      else if (state.activeTab === 'environment') renderEnvironmentChart();
      else if (state.activeTab === 'radar') renderRadarChart();
    }
  }

  // --- Chart 1: Throughput vs vCPU ---
  function renderThroughputChart() {
    var data = getFilteredData();
    var canvas = document.getElementById('insightsCanvas');
    var ctx = canvas.getContext('2d');

    var baselinePoints = [];
    var tailscalePoints = [];
    data.forEach(function(d) {
      if (!d.baseline_tcp || !d.tailscale_tcp) return;
      var vcpus = getVCPUs(d);
      var bBW = d.baseline_tcp.summary.bandwidth_mbps_avg / 1000;
      var tBW = d.tailscale_tcp.summary.bandwidth_mbps_avg / 1000;
      var key = d.instance_type + (d.ena_express ? '-ena' : '');
      baselinePoints.push({ x: vcpus, y: bBW, instanceKey: key, label: d.instance_type, provider: (d.cloud_provider || 'gcp').toUpperCase() });
      tailscalePoints.push({ x: vcpus, y: tBW, instanceKey: key, label: d.instance_type, provider: (d.cloud_provider || 'gcp').toUpperCase() });
    });

    activeChart = new Chart(ctx, {
      type: 'scatter',
      data: {
        datasets: [
          {
            label: 'Baseline',
            data: baselinePoints,
            backgroundColor: cssVar('--accent'),
            borderColor: cssVar('--accent'),
            pointRadius: 6,
            pointHoverRadius: 9,
            pointStyle: 'circle'
          },
          {
            label: 'Tailscale',
            data: tailscalePoints,
            backgroundColor: cssVar('--indigo'),
            borderColor: cssVar('--indigo'),
            pointRadius: 6,
            pointHoverRadius: 9,
            pointStyle: 'triangle'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'nearest', intersect: true },
        onClick: function(evt, elements) {
          if (elements.length > 0) {
            var el = elements[0];
            var pt = activeChart.data.datasets[el.datasetIndex].data[el.index];
            if (pt && pt.instanceKey) highlightInstance(pt.instanceKey);
          }
        },
        scales: {
          x: {
            type: 'logarithmic',
            title: { display: true, text: 'vCPUs', color: cssVar('--text-secondary'), font: { size: 12 } },
            ticks: { color: cssVar('--text-muted'), callback: function(v) { return v; } },
            grid: { color: cssVar('--border-subtle') }
          },
          y: {
            title: { display: true, text: 'Throughput (Gbps)', color: cssVar('--text-secondary'), font: { size: 12 } },
            ticks: { color: cssVar('--text-muted') },
            grid: { color: cssVar('--border-subtle') },
            beginAtZero: true
          }
        },
        plugins: {
          legend: {
            labels: { color: cssVar('--text-secondary'), usePointStyle: true, pointStyle: 'circle', padding: 16 }
          },
          tooltip: {
            backgroundColor: cssVar('--bg-card'),
            titleColor: cssVar('--text-primary'),
            bodyColor: cssVar('--text-secondary'),
            borderColor: cssVar('--border'),
            borderWidth: 1,
            padding: 10,
            callbacks: {
              title: function(items) {
                var pt = items[0].raw;
                return pt.label + ' (' + pt.provider + ')';
              },
              label: function(item) {
                return item.dataset.label + ': ' + item.raw.y.toFixed(2) + ' Gbps @ ' + item.raw.x + ' vCPUs';
              }
            }
          }
        }
      }
    });
  }

  // --- Chart 2: Overhead Heatmap ---
  function renderHeatmap() {
    var data = getFilteredData();
    var container = document.getElementById('heatmapContainer');

    // Build grid: rows=families, cols=vcpu counts
    var familyMap = {};
    var vcpuSet = {};
    data.forEach(function(d) {
      var fam = d.instance_family.toUpperCase();
      var vcpus = getVCPUs(d);
      if (!familyMap[fam]) familyMap[fam] = {};
      familyMap[fam][vcpus] = d;
      vcpuSet[vcpus] = true;
    });

    var families = Object.keys(familyMap).sort();
    var vcpuCols = Object.keys(vcpuSet).map(Number).sort(function(a, b) { return a - b; });

    if (families.length === 0 || vcpuCols.length === 0) {
      container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted)">No data for current filters</div>';
      return;
    }

    var cols = vcpuCols.length + 1;
    var html = '<div class="heatmap-grid" style="grid-template-columns: 80px repeat(' + vcpuCols.length + ', 1fr)">';

    // Header row
    html += '<div class="heatmap-cell header-cell"></div>';
    vcpuCols.forEach(function(v) {
      html += '<div class="heatmap-cell header-cell">' + v + ' vCPU</div>';
    });

    // Data rows
    families.forEach(function(fam) {
      html += '<div class="heatmap-cell header-cell">' + fam + '</div>';
      vcpuCols.forEach(function(v) {
        var d = familyMap[fam][v];
        if (!d) {
          html += '<div class="heatmap-cell empty-cell">—</div>';
          return;
        }
        // Use iperf overhead if available, fall back to L7 QPS overhead
        var pct;
        var label;
        if (d.overhead) {
          pct = d.overhead.bandwidth_pct;
          label = pct.toFixed(1) + '%';
        } else if (d.l7_overhead) {
          pct = Math.abs(d.l7_overhead.qps.delta_pct);
          label = pct.toFixed(0) + '% QPS';
        } else {
          html += '<div class="heatmap-cell empty-cell">—</div>';
          return;
        }
        var key = d.instance_type + (d.ena_express ? '-ena' : '');
        var bg, color;
        if (pct < 5) {
          bg = cssVar('--green-bg');
          color = cssVar('--green');
        } else if (pct <= 15) {
          bg = cssVar('--yellow-bg');
          color = cssVar('--yellow');
        } else {
          bg = cssVar('--red-bg');
          color = cssVar('--red');
        }
        // Increase opacity based on magnitude
        var opacity = Math.min(0.3 + (pct / 30), 1);
        html += '<div class="heatmap-cell" data-instance="' + key + '" style="background:' + bg + ';color:' + color + ';opacity:' + opacity.toFixed(2) + '" title="' + d.instance_type + (d.transport_mode ? ' (' + d.transport_mode + ')' : '') + ': ' + label + ' overhead">' + label + '</div>';
      });
    });

    html += '</div>';
    container.innerHTML = html;

    // Click handlers
    container.querySelectorAll('.heatmap-cell[data-instance]').forEach(function(cell) {
      cell.addEventListener('click', function() {
        highlightInstance(this.getAttribute('data-instance'));
      });
    });
  }

  // --- Chart 3: Efficiency (Gbps per vCPU) ---
  function renderEfficiencyChart() {
    var data = getFilteredData();
    var canvas = document.getElementById('insightsCanvas');
    var ctx = canvas.getContext('2d');

    var entries = data.filter(function(d) { return d.baseline_tcp && d.tailscale_tcp; }).map(function(d) {
      var vcpus = getVCPUs(d);
      var bGbps = d.baseline_tcp.summary.bandwidth_mbps_avg / 1000;
      var tGbps = d.tailscale_tcp.summary.bandwidth_mbps_avg / 1000;
      return {
        label: d.instance_type,
        instanceKey: d.instance_type + (d.ena_express ? '-ena' : ''),
        baselineEff: vcpus > 0 ? bGbps / vcpus : 0,
        tailscaleEff: vcpus > 0 ? tGbps / vcpus : 0,
        vcpus: vcpus
      };
    }).sort(function(a, b) { return b.tailscaleEff - a.tailscaleEff; });

    var labels = entries.map(function(e) { return e.label; });

    activeChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Baseline Gbps/vCPU',
            data: entries.map(function(e) { return e.baselineEff; }),
            backgroundColor: cssVar('--accent') + '99',
            borderColor: cssVar('--accent'),
            borderWidth: 1,
            borderRadius: 3
          },
          {
            label: 'Tailscale Gbps/vCPU',
            data: entries.map(function(e) { return e.tailscaleEff; }),
            backgroundColor: cssVar('--indigo') + '99',
            borderColor: cssVar('--indigo'),
            borderWidth: 1,
            borderRadius: 3
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        onClick: function(evt, elements) {
          if (elements.length > 0) {
            var idx = elements[0].index;
            highlightInstance(entries[idx].instanceKey);
          }
        },
        scales: {
          x: {
            title: { display: true, text: 'Gbps per vCPU', color: cssVar('--text-secondary'), font: { size: 12 } },
            ticks: { color: cssVar('--text-muted') },
            grid: { color: cssVar('--border-subtle') },
            beginAtZero: true
          },
          y: {
            ticks: {
              color: cssVar('--text-muted'),
              font: { family: cssVar('--font-mono'), size: 11 }
            },
            grid: { display: false }
          }
        },
        plugins: {
          legend: {
            labels: { color: cssVar('--text-secondary'), padding: 16 }
          },
          tooltip: {
            backgroundColor: cssVar('--bg-card'),
            titleColor: cssVar('--text-primary'),
            bodyColor: cssVar('--text-secondary'),
            borderColor: cssVar('--border'),
            borderWidth: 1,
            padding: 10,
            callbacks: {
              afterBody: function(items) {
                var idx = items[0].dataIndex;
                return 'vCPUs: ' + entries[idx].vcpus;
              }
            }
          }
        }
      }
    });
  }

  // --- Chart: L7 QPS Comparison ---
  function renderL7QPSChart() {
    var data = getFilteredData().filter(function(d) { return d.fortio_result; });
    var canvas = document.getElementById('insightsCanvas');
    var ctx = canvas.getContext('2d');

    if (data.length === 0) {
      activeChart = new Chart(ctx, { type: 'bar', data: { labels: ['No L7 data'], datasets: [] }, options: { responsive: true, maintainAspectRatio: false } });
      return;
    }

    // Sort by QPS descending
    data.sort(function(a, b) { return b.fortio_result.qps - a.fortio_result.qps; });

    // Color by mode
    var modeColors = {
      'l4-lb': { bg: cssVar('--accent') + '99', border: cssVar('--accent') },
      'l7-ingress-h1': { bg: 'rgba(139,92,246,0.6)', border: '#8b5cf6' },
      'l7-ingress-h2': { bg: 'rgba(236,72,153,0.6)', border: '#ec4899' },
      'l7-serve-h1': { bg: 'rgba(16,185,129,0.6)', border: '#10b981' },
      'l7-serve-h2': { bg: 'rgba(20,184,166,0.6)', border: '#14b8a6' }
    };
    var defaultColor = { bg: cssVar('--text-muted') + '66', border: cssVar('--text-muted') };

    var labels = data.map(function(d) {
      var prov = (d.cloud_provider || 'gcp').toUpperCase();
      return d.instance_type + ' (' + prov + ')';
    });

    // Group by mode for datasets
    var modes = {};
    data.forEach(function(d) { modes[d.transport_mode] = true; });
    var datasets = Object.keys(modes).sort().map(function(mode) {
      var c = modeColors[mode] || defaultColor;
      return {
        label: mode,
        data: data.map(function(d) { return d.transport_mode === mode ? d.fortio_result.qps : null; }),
        backgroundColor: c.bg,
        borderColor: c.border,
        borderWidth: 1,
        borderRadius: 3,
        skipNull: true
      };
    });

    activeChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: labels, datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        onClick: function(evt, elements) {
          if (elements.length > 0) {
            var idx = elements[0].index;
            var d = data[idx];
            highlightInstance(d.instance_type + (d.ena_express ? '-ena' : '') + (d.transport_mode ? '-' + d.transport_mode : ''));
          }
        },
        scales: {
          x: {
            title: { display: true, text: 'Requests/sec (QPS)', color: cssVar('--text-secondary'), font: { size: 12 } },
            ticks: { color: cssVar('--text-muted'), callback: function(v) { return v >= 1000 ? (v/1000).toFixed(0) + 'k' : v; } },
            grid: { color: cssVar('--border-subtle') },
            beginAtZero: true
          },
          y: {
            ticks: { color: cssVar('--text-muted'), font: { family: cssVar('--font-mono'), size: 10 } },
            grid: { display: false }
          }
        },
        plugins: {
          legend: { labels: { color: cssVar('--text-secondary'), padding: 12 } },
          tooltip: {
            backgroundColor: cssVar('--bg-card'),
            titleColor: cssVar('--text-primary'),
            bodyColor: cssVar('--text-secondary'),
            borderColor: cssVar('--border'),
            borderWidth: 1,
            padding: 10,
            callbacks: {
              label: function(item) {
                if (item.raw === null) return null;
                var d = data[item.dataIndex];
                var qps = item.raw;
                var baseline = d.l7_overhead ? d.l7_overhead.qps.baseline : 0;
                var delta = d.l7_overhead ? d.l7_overhead.qps.delta_pct.toFixed(1) + '%' : '';
                return item.dataset.label + ': ' + qps.toFixed(0) + ' QPS' + (baseline ? ' (baseline ' + baseline.toFixed(0) + ', ' + delta + ')' : '');
              }
            }
          }
        }
      }
    });
  }

  // --- Chart: L7 Latency Comparison ---
  function renderL7LatencyChart() {
    var data = getFilteredData().filter(function(d) { return d.fortio_result; });
    var canvas = document.getElementById('insightsCanvas');
    var ctx = canvas.getContext('2d');

      activeChart = new Chart(ctx, { type: 'bar', data: { labels: ['No L7 data'], datasets: [] }, options: { responsive: true, maintainAspectRatio: false } });
      return;
    }

    // Sort by p99 ascending (best first)
    data.sort(function(a, b) { return a.fortio_result.p99_latency_ms - b.fortio_result.p99_latency_ms; });

    var labels = data.map(function(d) {
      var prov = (d.cloud_provider || 'gcp').toUpperCase();
      return d.instance_type + ' ' + (d.transport_mode || '') + ' (' + prov + ')';
    });

    activeChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'P50 Latency',
            data: data.map(function(d) { return d.fortio_result.p50_latency_ms; }),
            backgroundColor: cssVar('--green') + '99',
            borderColor: cssVar('--green'),
            borderWidth: 1,
            borderRadius: 3
          },
          {
            label: 'P99 Latency',
            data: data.map(function(d) { return d.fortio_result.p99_latency_ms; }),
            backgroundColor: cssVar('--yellow') + '99',
            borderColor: cssVar('--yellow'),
            borderWidth: 1,
            borderRadius: 3
          },

  // --- Chart 4: Provider Radar ---
  function renderRadarChart() {
    var canvas = document.getElementById('insightsCanvas');
    var ctx = canvas.getContext('2d');

    // Aggregate per provider using filtered data
    var data = getFilteredData();
    var providerAgg = {};
    data.forEach(function(d) {
      if (!d.tailscale_tcp || !d.overhead) return;
      var p = (d.cloud_provider || 'gcp').toLowerCase();
      if (!providerAgg[p]) providerAgg[p] = { maxBW: 0, overheads: [], latencies: [], effs: [], bws: [], count: 0 };
      var agg = providerAgg[p];
      var bw = d.tailscale_tcp.summary.bandwidth_mbps_avg / 1000;
      var vcpus = getVCPUs(d);
      agg.count++;
      agg.bws.push(bw);
      if (bw > agg.maxBW) agg.maxBW = bw;
      agg.overheads.push(d.overhead.bandwidth_pct);
      // Only include real latency measurements
      if (d.tailscale_mtr && d.tailscale_mtr.hops && d.tailscale_mtr.hops.length > 0) {
        var lastHop = d.tailscale_mtr.hops[d.tailscale_mtr.hops.length - 1];
        if (lastHop.avg_ms > 0) agg.latencies.push(lastHop.avg_ms);
      }
      if (vcpus > 0) agg.effs.push(bw / vcpus);
    });

    var providers = Object.keys(providerAgg);
    if (providers.length === 0) return;

    // Compute aggregates
    providers.forEach(function(p) {
      var a = providerAgg[p];
      a.avgOH = a.overheads.reduce(function(s, v) { return s + v; }, 0) / a.overheads.length;
      a.avgLat = a.latencies.length > 0 ? a.latencies.reduce(function(s, v) { return s + v; }, 0) / a.latencies.length : null;
      a.avgEff = a.effs.length > 0 ? a.effs.reduce(function(s, v) { return s + v; }, 0) / a.effs.length : 0;
      var mean = a.bws.reduce(function(s, v) { return s + v; }, 0) / a.bws.length;
      a.stddev = a.bws.length > 1
        ? Math.sqrt(a.bws.reduce(function(s, v) { return s + (v - mean) * (v - mean); }, 0) / a.bws.length)
        : 0;
    });

    // Min-max normalize with floor at 20 so no axis collapses to 0
    function normalize(vals, higherIsBetter) {
      var min = Math.min.apply(null, vals);
      var max = Math.max.apply(null, vals);
      if (max === min) return vals.map(function() { return 75; }); // equal = all good
      return vals.map(function(v) {
        var pct = (v - min) / (max - min);
        if (!higherIsBetter) pct = 1 - pct;
        return 20 + pct * 80; // range [20, 100]
      });
    }

    var bwScores = normalize(providers.map(function(p) { return providerAgg[p].maxBW; }), true);
    var ohScores = normalize(providers.map(function(p) { return providerAgg[p].avgOH; }), false);
    // For latency, exclude providers with no data (null) — give them score 50
    var latVals = providers.map(function(p) { return providerAgg[p].avgLat; });
    var latHasData = latVals.filter(function(v) { return v !== null; });
    var latScores;
    if (latHasData.length >= 2) {
      var latMin = Math.min.apply(null, latHasData);
      var latMax = Math.max.apply(null, latHasData);
      latScores = latVals.map(function(v) {
        if (v === null) return 50;
        if (latMax === latMin) return 75;
        return 20 + (1 - (v - latMin) / (latMax - latMin)) * 80;
      });
    } else {
      latScores = providers.map(function() { return 75; });
    }
    var effScores = normalize(providers.map(function(p) { return providerAgg[p].avgEff; }), true);
    var stdScores = normalize(providers.map(function(p) { return providerAgg[p].stddev; }), false);

    var colorMap = {
      gcp: { bg: 'rgba(59,130,246,0.15)', border: cssVar('--accent') },
      aws: { bg: 'rgba(245,158,11,0.15)', border: cssVar('--amber') },
      azure: { bg: 'rgba(16,185,129,0.15)', border: cssVar('--emerald') }
    };

    var datasets = providers.map(function(p, i) {
      var a = providerAgg[p];
      var scores = [bwScores[i], ohScores[i], latScores[i], effScores[i], stdScores[i]];
      var c = colorMap[p] || { bg: 'rgba(156,163,175,0.15)', border: cssVar('--text-muted') };
      return {
        label: p.toUpperCase() + ' (' + a.count + ' tests)',
        data: scores,
        backgroundColor: c.bg,
        borderColor: c.border,
        borderWidth: 2,
        pointBackgroundColor: c.border,
        pointRadius: 4,
        pointHoverRadius: 6
      };
    });

    activeChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['Max Throughput', 'Low Overhead', 'Low Latency', 'Gbps/vCPU', 'Consistency'],
        datasets: datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          r: {
            beginAtZero: true,
            max: 100,
            ticks: { display: false },
            grid: { color: cssVar('--border') },
            angleLines: { color: cssVar('--border') },
            pointLabels: {
              color: cssVar('--text-secondary'),
              font: { size: 12, weight: 600 }
            }
          }
        },
        plugins: {
          legend: {
            labels: { color: cssVar('--text-secondary'), padding: 16, usePointStyle: true }
          },
          tooltip: {
            backgroundColor: cssVar('--bg-card'),
            titleColor: cssVar('--text-primary'),
            bodyColor: cssVar('--text-secondary'),
            borderColor: cssVar('--border'),
            borderWidth: 1,
            padding: 10,
            callbacks: {
              label: function(item) {
                var pIdx = item.datasetIndex;
                var p = providers[pIdx];
                var a = providerAgg[p];
                var axisLabels = ['Max Throughput', 'Low Overhead', 'Low Latency', 'Gbps/vCPU', 'Consistency'];
                var axisIdx = item.dataIndex;
                var detail = '';
                switch (axisIdx) {
                  case 0: detail = a.maxBW.toFixed(1) + ' Gbps'; break;
                  case 1: detail = a.avgOH.toFixed(1) + '% avg'; break;
                  case 2: detail = a.avgLat !== null ? a.avgLat.toFixed(2) + ' ms' : 'no data'; break;
                  case 3: detail = a.avgEff.toFixed(2) + ' Gbps/vCPU'; break;
                  case 4: detail = 'stddev ' + a.stddev.toFixed(2) + ' Gbps'; break;
                }
                return p.toUpperCase() + ': ' + detail + ' (score ' + item.raw.toFixed(0) + ')';
              }
            }
          }
        }
      }
    });
  }

  // --- Stats ---
  function renderStats() {
    var data = getFilteredData();
    var totalTests = data.length;
    var overheadData = data.filter(function(d) { return d.overhead; });
    var avgOverhead = overheadData.reduce(function(s, d) { return s + d.overhead.bandwidth_pct; }, 0) / (overheadData.length || 1);
    var bestEntry = null, worstEntry = null;
    overheadData.forEach(function(d) {
      if (!bestEntry || d.overhead.bandwidth_pct < bestEntry.overhead.bandwidth_pct) bestEntry = d;
      if (!worstEntry || d.overhead.bandwidth_pct > worstEntry.overhead.bandwidth_pct) worstEntry = d;
    });
    var html = '';
    html += '<div class="stat-card"><div class="stat-label">Total Tests</div><div class="stat-value">' + totalTests + '</div><div class="stat-sub">instance configurations</div></div>';
    html += '<div class="stat-card"><div class="stat-label">Avg BW Overhead</div><div class="stat-value">' + avgOverhead.toFixed(1) + '<small>%</small></div><div class="stat-sub">Tailscale vs baseline</div></div>';
    html += '<div class="stat-card"><div class="stat-label">Best Performer</div><div class="stat-value" style="font-size:1.05rem">' + (bestEntry ? bestEntry.instance_type : '—') + '</div><div class="stat-sub">' + (bestEntry ? bestEntry.overhead.bandwidth_pct.toFixed(1) + '% overhead' : '') + '</div></div>';
    html += '<div class="stat-card"><div class="stat-label">Highest Overhead</div><div class="stat-value" style="font-size:1.05rem">' + (worstEntry ? worstEntry.instance_type : '—') + '</div><div class="stat-sub">' + (worstEntry ? worstEntry.overhead.bandwidth_pct.toFixed(1) + '% overhead' : '') + '</div></div>';
    document.getElementById('statsRow').innerHTML = html;
  }

  // --- Sort ---
  function getSortVal(d, key) {
    switch (key) {
      case 'instance_type': return d.instance_type;
      case 'cloud': return (d.cloud_provider || 'gcp');
      case 'vcpus': return getVCPUs(d);
      case 'baseline_bw': return d.baseline_tcp ? d.baseline_tcp.summary.bandwidth_mbps_avg : 0;
      case 'ts_bw': return d.tailscale_tcp ? d.tailscale_tcp.summary.bandwidth_mbps_avg : 0;
      case 'overhead': return d.overhead ? d.overhead.bandwidth_pct : 0;
      case 'baseline_retrans': return d.baseline_tcp ? d.baseline_tcp.summary.retransmits_avg : 0;
      case 'ts_retrans': return d.tailscale_tcp ? d.tailscale_tcp.summary.retransmits_avg : 0;
      case 'baseline_bw_single': return d.baseline_tcp_single ? d.baseline_tcp_single.summary.bandwidth_mbps_avg : 0;
      case 'ts_bw_single': return d.tailscale_tcp_single ? d.tailscale_tcp_single.summary.bandwidth_mbps_avg : 0;
      case 'k8s_pod_to_vm': return d.k8s_pod_to_vm_tcp ? d.k8s_pod_to_vm_tcp.summary.bandwidth_mbps_avg : 0;
      case 'k8s_vm_to_pod': return d.k8s_vm_to_pod_tcp ? d.k8s_vm_to_pod_tcp.summary.bandwidth_mbps_avg : 0;
      case 'transport_mode': return d.transport_mode || '';
      case 'qps': return d.fortio_result ? d.fortio_result.qps : 0;
      case 'p99': return d.fortio_result ? d.fortio_result.p99_latency_ms : 0;
      default: return 0;
    }
  }
  function sortData(data) {
    if (!state.sortKey) return data;
    var dir = state.sortDir === 'asc' ? 1 : -1;
    return data.sort(function(a, b) {
      var va = getSortVal(a, state.sortKey);
      var vb = getSortVal(b, state.sortKey);
      if (typeof va === 'string') return dir * va.localeCompare(vb);
      return dir * (va - vb);
    });
  }

  function overheadClass(pct) {
    if (pct < 5) return 'overhead-green';
    if (pct <= 15) return 'overhead-yellow';
    return 'overhead-red';
  }

  function toGbps(mbps) { return (mbps / 1000).toFixed(2); }
  function fmtNum(n, dec) { return Number(n).toFixed(dec !== undefined ? dec : 0); }

  var showCloudCol = multiProvider && state.provider === 'all';

  function renderTableHead() {

    if (hasK8s) {

      cols.push({key:'k8s_vm_to_pod', label:'VM\u2192K8s'});
    }
    if (hasFortio) {
      cols.push({key:'transport_mode', label:'Transport'});
      cols.push({key:'qps', label:'QPS'});
      cols.push({key:'p99', label:'P99 Latency'});

    cols.push({key:'overhead', label:'BW Overhead'});

    cols.push({key:'ts_retrans', label:'TS Retrans'});
    cols.push({key:'', label:'Actions'});

    var html = '<tr>';
    cols.forEach(function(c) {
      var sorted = c.key === state.sortKey;
      var arrow = sorted ? (state.sortDir === 'asc' ? '&#9650;' : '&#9660;') : '&#9650;';
      html += '<th data-sort="' + c.key + '"' + (sorted ? ' class="sorted"' : '') + '>' + c.label;
      if (c.key) html += ' <span class="sort-arrow">' + arrow + '</span>';
      html += '</th>';
    });
    html += '</tr>';
    document.getElementById('tableHead').innerHTML = html;

    document.querySelectorAll('#tableHead th[data-sort]').forEach(function(th) {
      var key = th.getAttribute('data-sort');
      if (!key) return;
      th.addEventListener('click', function() {
        if (state.sortKey === key) {
          state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = key;
          state.sortDir = 'asc';
        }
        writeHash();
        render();
      });
    });
  }

  function renderTable() {
    var data = sortData(getFilteredData());
    var tbody = document.getElementById('tableBody');
    var colCount = (showCloudCol ? 9 : 8) + (hasSingle ? 2 : 0) + (hasK8s ? 2 : 0) + (hasFortio ? 3 : 0);
    var html = '';

    data.forEach(function(d) {
      var rowKey = d.instance_type + (d.ena_express ? '-ena' : '') + (d.transport_mode ? '-' + d.transport_mode : '') + (d.environment === 'container' ? '-ctr' : '');
      var vcpus = getVCPUs(d);
      var bBW = d.baseline_tcp ? d.baseline_tcp.summary.bandwidth_mbps_avg : 0;
      var tBW = d.tailscale_tcp ? d.tailscale_tcp.summary.bandwidth_mbps_avg : 0;
      var bBarW = maxBW ? (bBW / maxBW * 85).toFixed(1) : 0;
      var tBarW = maxBW ? (tBW / maxBW * 85).toFixed(1) : 0;
      var oc = d.overhead ? overheadClass(d.overhead.bandwidth_pct) : '';
      var isOpen = state.expanded === rowKey;

      html += '<tr data-instance="' + rowKey + '" class="data-row">';
      var envLabel = d.environment === 'container' ? '<span class="env-tag container">Container</span>' : (hasMultiEnv ? '<span class="env-tag vm">VM</span>' : '');
      html += '<td><span class="instance-type">' + d.instance_type + '</span><span class="instance-family-tag">' + d.instance_family.toUpperCase() + '</span>' + envLabel + (d.ena_express ? '<span class="ena-tag">ENA Express</span>' : '') + (d.k8s_pod_to_vm_tcp ? '<span class="k8s-tag">K8s</span>' : '') + '</td>';
      if (showCloudCol) {
        html += '<td><span class="cloud-tag">' + (d.cloud_provider || 'gcp').toUpperCase() + '</span></td>';
      }
      html += '<td class="mono">' + vcpus + '</td>';
      html += '<td class="mono bw-cell">' + (d.baseline_tcp ? '<div class="bw-bar baseline" style="width:' + bBarW + '%"></div><span class="bw-val">' + toGbps(bBW) + ' <small style="color:var(--text-muted)">Gbps</small></span>' : '\u2014') + '</td>';
      html += '<td class="mono bw-cell">' + (d.tailscale_tcp ? '<div class="bw-bar tailscale" style="width:' + tBarW + '%"></div><span class="bw-val">' + toGbps(tBW) + ' <small style="color:var(--text-muted)">Gbps</small></span>' : '\u2014') + '</td>';
      if (hasSingle) {
        var bSingleBW = d.baseline_tcp_single ? d.baseline_tcp_single.summary.bandwidth_mbps_avg : 0;
        var tSingleBW = d.tailscale_tcp_single ? d.tailscale_tcp_single.summary.bandwidth_mbps_avg : 0;
        var bSingleBarW = maxBW ? (bSingleBW / maxBW * 85).toFixed(1) : 0;
        var tSingleBarW = maxBW ? (tSingleBW / maxBW * 85).toFixed(1) : 0;
        html += '<td class="mono bw-cell"><div class="bw-bar baseline" style="width:' + bSingleBarW + '%"></div><span class="bw-val">' + (d.baseline_tcp_single ? toGbps(bSingleBW) : '—') + ' <small style="color:var(--text-muted)">Gbps</small></span></td>';
        html += '<td class="mono bw-cell"><div class="bw-bar tailscale" style="width:' + tSingleBarW + '%"></div><span class="bw-val">' + (d.tailscale_tcp_single ? toGbps(tSingleBW) : '—') + ' <small style="color:var(--text-muted)">Gbps</small></span></td>';
      }
      if (hasK8s) {
        if (d.k8s_pod_to_vm_tcp) {
          var k8sPodBW = d.k8s_pod_to_vm_tcp.summary.bandwidth_mbps_avg;
          var k8sPodBarW = maxBW ? (k8sPodBW / maxBW * 85).toFixed(1) : 0;
          html += '<td class="mono bw-cell"><div class="bw-bar baseline" style="width:' + k8sPodBarW + '%"></div><span class="bw-val">' + toGbps(k8sPodBW) + ' <small style="color:var(--text-muted)">Gbps</small></span></td>';
        } else {
          html += '<td class="mono">—</td>';
        }
        if (d.k8s_vm_to_pod_tcp) {
          var k8sVmBW = d.k8s_vm_to_pod_tcp.summary.bandwidth_mbps_avg;
          var k8sVmBarW = maxBW ? (k8sVmBW / maxBW * 85).toFixed(1) : 0;
          html += '<td class="mono bw-cell"><div class="bw-bar baseline" style="width:' + k8sVmBarW + '%"></div><span class="bw-val">' + toGbps(k8sVmBW) + ' <small style="color:var(--text-muted)">Gbps</small></span></td>';
        } else {
          html += '<td class="mono">—</td>';
        }
      }
      if (hasFortio) {
        var mode = d.transport_mode || '';
        var modeClass = mode.startsWith('l7') ? 'mode-l7' : mode.startsWith('l4') ? 'mode-l4' : mode.startsWith('tsnet') ? 'mode-tsnet' : '';
        html += '<td>' + (mode ? '<span class="mode-tag ' + modeClass + '">' + mode + '</span>' : '\u2014') + '</td>';
        html += '<td class="mono">' + (d.fortio_result ? fmtNum(d.fortio_result.qps, 0) : '\u2014') + '</td>';
        html += '<td class="mono">' + (d.fortio_result ? d.fortio_result.p99_latency_ms.toFixed(1) + ' ms' : '\u2014') + '</td>';
      }
      html += '<td>' + (d.overhead ? '<span class="overhead-badge ' + oc + '">' + d.overhead.bandwidth_pct.toFixed(1) + '%</span>' : '\u2014') + '</td>';
      html += '<td class="mono">' + (d.baseline_tcp ? fmtNum(d.baseline_tcp.summary.retransmits_avg, 1) : '\u2014') + '</td>';
      html += '<td class="mono">' + (d.tailscale_tcp ? fmtNum(d.tailscale_tcp.summary.retransmits_avg, 1) : '\u2014') + '</td>';
      html += '<td><button class="btn-details" data-instance="' + rowKey + '">' + (isOpen ? 'Close' : 'Details') + '</button></td>';
      html += '</tr>';

      // Detail row
      html += '<tr class="detail-row' + (isOpen ? ' open' : '') + '" data-detail="' + rowKey + '">';
      html += '<td colspan="' + colCount + '"><div class="detail-content">';
      html += renderDetail(d);
      html += '</div></td></tr>';
    });

    tbody.innerHTML = html;

    document.querySelectorAll('.data-row').forEach(function(row) {
      row.addEventListener('click', function(e) {
        if (e.target.closest('.btn-details')) return;
        toggleDetail(this.getAttribute('data-instance'));
      });
    });
    document.querySelectorAll('.btn-details').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleDetail(this.getAttribute('data-instance'));
      });
    });
  }

  function toggleDetail(instanceType) {
    state.expanded = state.expanded === instanceType ? null : instanceType;
    renderTable();
  }

      html += '</div>';
    }

    if (d.fortio_result) {
      html += '<div class="detail-grid" style="margin-top:16px"><div class="detail-section" style="grid-column:1/-1">';
      html += '<h4>HTTP Performance (fortio)</h4>';
      html += '<div class="detail-meta">';
      if (d.transport_mode) html += '<div class="detail-meta-item"><strong>Transport:</strong> ' + d.transport_mode + '</div>';
      if (d.http_version) html += '<div class="detail-meta-item"><strong>HTTP:</strong> ' + d.http_version + '</div>';
      if (d.ha_mode) html += '<div class="detail-meta-item"><strong>HA:</strong> ' + d.ha_mode + '</div>';
      html += '</div>';
      var fr = d.fortio_result;
      html += '<table class="mini-table"><thead><tr><th>QPS</th><th>P50</th><th>P90</th><th>P99</th><th>P99.9</th><th>Errors</th></tr></thead><tbody>';
      html += '<tr><td>' + fmtNum(fr.qps, 0) + '</td><td>' + fr.p50_latency_ms.toFixed(2) + ' ms</td><td>' + fr.p90_latency_ms.toFixed(2) + ' ms</td><td>' + fr.p99_latency_ms.toFixed(2) + ' ms</td><td>' + fr.p999_latency_ms.toFixed(2) + ' ms</td><td>' + fr.connection_errors + '</td></tr>';
      html += '</tbody></table>';
      if (d.l7_overhead) {
        var lo = d.l7_overhead;
        html += '<div class="detail-meta" style="margin-top:8px">';
        html += '<div class="detail-meta-item"><strong>QPS overhead:</strong> ' + lo.qps.delta_pct.toFixed(1) + '%</div>';
        html += '<div class="detail-meta-item"><strong>P50 overhead:</strong> +' + lo.p50_latency.delta_pct.toFixed(1) + '%</div>';
        html += '<div class="detail-meta-item"><strong>P99 overhead:</strong> +' + lo.p99_latency.delta_pct.toFixed(1) + '%</div>';
        html += '</div>';
      }
      html += '</div></div>';
    }

    return html;
  }

  // --- Full render ---
  function render() {
    renderStats();
    renderProviderFilter();
    renderFamilyFilter();
    renderEnvFilter();
    renderK8sFilter();
    renderModeFilter();
    renderTableHead();
    renderTable();
    renderInsightsTabs();
    try { renderChart(); } catch(e) { console.warn('chart render error:', e); }
  }

  render();

  window.addEventListener('hashchange', function() {
    readHash();
    render();
  });
})();
</script>
</body>
</html>
