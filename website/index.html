<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tailbench — Tailscale Network Performance Benchmarks</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f8f9fb;
  --bg-tertiary: #f0f1f4;
  --bg-card: #ffffff;
  --bg-hover: #f3f4f7;
  --bg-bar: #e8eaef;
  --text-primary: #111827;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --border: #e5e7eb;
  --border-subtle: #f0f1f4;
  --accent: #2563eb;
  --accent-soft: rgba(37, 99, 235, 0.08);
  --accent-bar: rgba(37, 99, 235, 0.15);
  --green: #059669;
  --green-bg: rgba(5, 150, 105, 0.1);
  --yellow: #d97706;
  --yellow-bg: rgba(217, 119, 6, 0.1);
  --red: #dc2626;
  --red-bg: rgba(220, 38, 38, 0.1);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
  --radius: 8px;
  --radius-lg: 12px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  --transition: 200ms ease;
}

[data-theme="dark"] {
  --bg-primary: #0f1117;
  --bg-secondary: #161820;
  --bg-tertiary: #1e2028;
  --bg-card: #1a1c24;
  --bg-hover: #22242e;
  --bg-bar: #2a2d38;
  --text-primary: #f0f1f4;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border: #2a2d38;
  --border-subtle: #22242e;
  --accent: #3b82f6;
  --accent-soft: rgba(59, 130, 246, 0.1);
  --accent-bar: rgba(59, 130, 246, 0.18);
  --green: #34d399;
  --green-bg: rgba(52, 211, 153, 0.12);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251, 191, 36, 0.12);
  --red: #f87171;
  --red-bg: rgba(248, 113, 113, 0.12);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
}

html { font-size: 15px; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  transition: background var(--transition), color var(--transition);
  min-height: 100vh;
}

/* Layout */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  padding: 32px 0 28px;
  transition: background var(--transition);
}
.header-inner { display: flex; justify-content: space-between; align-items: flex-start; }
.header-text h1 {
  font-size: 1.65rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--text-primary);
}
.header-text h1 span { color: var(--accent); }
.header-text p {
  font-size: 0.9rem;
  color: var(--text-secondary);
  margin-top: 4px;
}
.theme-toggle {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 12px;
  cursor: pointer;
  font-size: 0.82rem;
  color: var(--text-secondary);
  transition: all var(--transition);
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
.theme-toggle svg { width: 15px; height: 15px; }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin: 24px 0;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  transition: all var(--transition);
}
.stat-card:hover { box-shadow: var(--shadow-md); }
.stat-label {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.stat-value {
  font-family: var(--font-mono);
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text-primary);
}
.stat-value small {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-left: 4px;
}
.stat-sub {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* Filters */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-bar label {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.pill-group { display: flex; gap: 4px; }
.pill {
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* Table */
.table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 12px 16px;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  text-align: left;
  cursor: pointer;
  user-select: none;
  transition: color var(--transition);
  white-space: nowrap;
  position: relative;
}
thead th:hover { color: var(--accent); }
thead th .sort-arrow {
  display: inline-block;
  margin-left: 4px;
  font-size: 0.65rem;
  opacity: 0.4;
  transition: opacity var(--transition);
}
thead th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
tbody tr {
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: background var(--transition);
}
tbody tr:hover { background: var(--bg-hover); }
tbody tr:last-child { border-bottom: none; }
td {
  padding: 11px 16px;
  font-size: 0.87rem;
  vertical-align: middle;
}
td.mono {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  font-variant-numeric: tabular-nums;
}
.instance-type {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--text-primary);
}
.instance-family-tag {
  display: inline-block;
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 8px;
  background: var(--accent-soft);
  color: var(--accent);
}

/* BW bar cell */
.bw-cell { position: relative; }
.bw-bar {
  position: absolute;
  left: 8px; top: 6px; bottom: 6px;
  border-radius: 4px;
  transition: width 400ms ease;
}
.bw-bar.baseline { background: var(--accent-bar); }
.bw-bar.tailscale { background: rgba(99, 102, 241, 0.13); }
.bw-val { position: relative; z-index: 1; }

/* Overhead badge */
.overhead-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  font-weight: 600;
}
.overhead-green { background: var(--green-bg); color: var(--green); }
.overhead-yellow { background: var(--yellow-bg); color: var(--yellow); }
.overhead-red { background: var(--red-bg); color: var(--red); }

/* Actions */
.btn-details {
  padding: 5px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.btn-details:hover { border-color: var(--accent); color: var(--accent); }

/* Detail row */
.detail-row td { padding: 0; }
.detail-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 350ms ease, padding 200ms ease;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-subtle);
}
.detail-row.open .detail-content {
  max-height: 800px;
  padding: 20px 24px;
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.detail-section h4 {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.detail-meta {
  display: flex;
  gap: 20px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.detail-meta-item {
  font-size: 0.78rem;
  color: var(--text-secondary);
}
.detail-meta-item strong {
  color: var(--text-primary);
  font-weight: 600;
}

/* Mini tables */
.mini-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
.mini-table th {
  padding: 6px 10px;
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  text-align: left;
  cursor: default;
  background: transparent;
}
.mini-table td {
  padding: 6px 10px;
  font-family: var(--font-mono);
  font-size: 0.76rem;
  border-bottom: 1px solid var(--border-subtle);
}
.mini-table tr:last-child td { border-bottom: none; }

/* MTR hop bars */
.mtr-comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.mtr-column h5 {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.mtr-hop {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
  font-size: 0.75rem;
}
.mtr-hop-num {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  min-width: 18px;
}
.mtr-hop-host {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-secondary);
  min-width: 100px;
}
.mtr-hop-bar-wrap {
  flex: 1;
  height: 16px;
  background: var(--bg-bar);
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}
.mtr-hop-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 400ms ease;
}
.mtr-hop-bar.baseline-bar { background: var(--accent); opacity: 0.6; }
.mtr-hop-bar.ts-bar { background: #818cf8; opacity: 0.6; }
.mtr-hop-val {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  min-width: 52px;
  text-align: right;
}

/* Footer */
footer {
  border-top: 1px solid var(--border);
  padding: 24px 0;
  margin-top: 40px;
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-muted);
}
footer a {
  color: var(--accent);
  text-decoration: none;
}
footer a:hover { text-decoration: underline; }

/* Responsive */
@media (max-width: 900px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .detail-grid { grid-template-columns: 1fr; }
  .mtr-comparison { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  html { font-size: 14px; }
  .stats-row { grid-template-columns: 1fr; }
  .container { padding: 0 16px; }
  header { padding: 20px 0 16px; }
  .header-inner { flex-direction: column; gap: 12px; }
  .table-wrap { overflow-x: auto; }
  table { min-width: 700px; }
}
</style>
</head>
<body>

<header>
  <div class="container header-inner">
    <div class="header-text">
      <h1>Tail<span>bench</span></h1>
      <p>Tailscale Network Performance Benchmarks</p>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span id="themeLabel">Light</span>
    </button>
  </div>
</header>

<main class="container">
  <div class="stats-row" id="statsRow"></div>

  <div class="filter-bar">
    <label>Family</label>
    <div class="pill-group" id="familyFilter"></div>
  </div>

  <div class="table-wrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th data-sort="instance_type">Instance Type <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="vcpus">vCPUs <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="baseline_bw">Baseline BW <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="ts_bw">Tailscale BW <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="overhead">BW Overhead <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="baseline_retrans">Baseline Retrans <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="ts_retrans">TS Retrans <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="">Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>

<footer>
  <div class="container">
    Tailbench &mdash; open-source network benchmarking for Tailscale.
    <a href="https://github.com/rajsinghtech/tailbench" target="_blank" rel="noopener">GitHub</a>
  </div>
</footer>

<script src="data.generated.js"></script>
<script>
(function() {
  'use strict';

  // --- vCPU lookup ---
  const VCPU_MAP = {
    'c3-standard-4': 4, 'c3-standard-8': 8, 'c3-standard-22': 22, 'c3-standard-44': 44,
    'n2-standard-2': 2, 'n2-standard-4': 4, 'n2-standard-8': 8, 'n2-standard-16': 16,
    'n2-standard-32': 32, 'n2-standard-48': 48, 'n2-standard-64': 64
  };
  function getVCPUs(type) {
    if (VCPU_MAP[type]) return VCPU_MAP[type];
    var m = type.match(/(\d+)$/);
    return m ? parseInt(m[1], 10) : '—';
  }

  // --- State ---
  var state = {
    filter: 'all',
    sortKey: 'instance_type',
    sortDir: 'asc',
    expanded: null
  };

  // --- Max BW for bar scaling ---
  var maxBW = 0;
  TAILBENCH_DATA.forEach(function(d) {
    var b = d.baseline_tcp.summary.bandwidth_mbps_avg;
    var t = d.tailscale_tcp.summary.bandwidth_mbps_avg;
    if (b > maxBW) maxBW = b;
    if (t > maxBW) maxBW = t;
  });

  // --- Theme ---
  function getSystemTheme() {
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var sun = document.getElementById('themeIconSun');
    var moon = document.getElementById('themeIconMoon');
    var label = document.getElementById('themeLabel');
    if (theme === 'dark') {
      sun.style.display = 'none';
      moon.style.display = 'block';
      label.textContent = 'Dark';
    } else {
      sun.style.display = 'block';
      moon.style.display = 'none';
      label.textContent = 'Light';
    }
  }
  var savedTheme = localStorage.getItem('tailbench-theme') || getSystemTheme();
  applyTheme(savedTheme);
  document.getElementById('themeToggle').addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('tailbench-theme', next);
    applyTheme(next);
  });

  // --- Hash state ---
  function readHash() {
    var h = location.hash.replace('#', '');
    if (!h) return;
    var params = {};
    h.split('&').forEach(function(pair) {
      var kv = pair.split('=');
      if (kv.length === 2) params[kv[0]] = decodeURIComponent(kv[1]);
    });
    if (params.family) state.filter = params.family;
    if (params.sort) state.sortKey = params.sort;
    if (params.dir) state.sortDir = params.dir;
  }
  function writeHash() {
    var parts = [];
    if (state.filter !== 'all') parts.push('family=' + encodeURIComponent(state.filter));
    if (state.sortKey !== 'instance_type') parts.push('sort=' + encodeURIComponent(state.sortKey));
    if (state.sortDir !== 'asc') parts.push('dir=' + encodeURIComponent(state.sortDir));
    location.hash = parts.length ? parts.join('&') : '';
  }
  readHash();

  // --- Stats ---
  function renderStats() {
    var data = getFilteredData();
    var totalTests = data.length;
    var avgOverhead = data.reduce(function(s, d) { return s + d.overhead.bandwidth_pct; }, 0) / (data.length || 1);
    var bestEntry = null, worstEntry = null;
    data.forEach(function(d) {
      if (!bestEntry || d.overhead.bandwidth_pct < bestEntry.overhead.bandwidth_pct) bestEntry = d;
      if (!worstEntry || d.overhead.bandwidth_pct > worstEntry.overhead.bandwidth_pct) worstEntry = d;
    });
    var html = '';
    html += '<div class="stat-card"><div class="stat-label">Total Tests</div><div class="stat-value">' + totalTests + '</div><div class="stat-sub">instance configurations</div></div>';
    html += '<div class="stat-card"><div class="stat-label">Avg BW Overhead</div><div class="stat-value">' + avgOverhead.toFixed(1) + '<small>%</small></div><div class="stat-sub">Tailscale vs baseline</div></div>';
    html += '<div class="stat-card"><div class="stat-label">Best Performer</div><div class="stat-value" style="font-size:1.05rem">' + (bestEntry ? bestEntry.instance_type : '—') + '</div><div class="stat-sub">' + (bestEntry ? bestEntry.overhead.bandwidth_pct.toFixed(1) + '% overhead' : '') + '</div></div>';
    html += '<div class="stat-card"><div class="stat-label">Highest Overhead</div><div class="stat-value" style="font-size:1.05rem">' + (worstEntry ? worstEntry.instance_type : '—') + '</div><div class="stat-sub">' + (worstEntry ? worstEntry.overhead.bandwidth_pct.toFixed(1) + '% overhead' : '') + '</div></div>';
    document.getElementById('statsRow').innerHTML = html;
  }

  // --- Filters ---
  function getFamilies() {
    var fam = {};
    TAILBENCH_DATA.forEach(function(d) { fam[d.instance_family.toUpperCase()] = true; });
    return Object.keys(fam).sort();
  }
  function renderFilters() {
    var families = getFamilies();
    var html = '<button class="pill' + (state.filter === 'all' ? ' active' : '') + '" data-family="all">All</button>';
    families.forEach(function(f) {
      html += '<button class="pill' + (state.filter === f.toLowerCase() ? ' active' : '') + '" data-family="' + f.toLowerCase() + '">' + f + '</button>';
    });
    document.getElementById('familyFilter').innerHTML = html;
    document.querySelectorAll('#familyFilter .pill').forEach(function(btn) {
      btn.addEventListener('click', function() {
        state.filter = this.getAttribute('data-family');
        state.expanded = null;
        writeHash();
        render();
      });
    });
  }
  function getFilteredData() {
    if (state.filter === 'all') return TAILBENCH_DATA.slice();
    return TAILBENCH_DATA.filter(function(d) { return d.instance_family.toLowerCase() === state.filter; });
  }

  // --- Sort ---
  function getSortVal(d, key) {
    switch (key) {
      case 'instance_type': return d.instance_type;
      case 'vcpus': return getVCPUs(d.instance_type);
      case 'baseline_bw': return d.baseline_tcp.summary.bandwidth_mbps_avg;
      case 'ts_bw': return d.tailscale_tcp.summary.bandwidth_mbps_avg;
      case 'overhead': return d.overhead.bandwidth_pct;
      case 'baseline_retrans': return d.baseline_tcp.summary.retransmits_avg;
      case 'ts_retrans': return d.tailscale_tcp.summary.retransmits_avg;
      default: return 0;
    }
  }
  function sortData(data) {
    if (!state.sortKey) return data;
    var dir = state.sortDir === 'asc' ? 1 : -1;
    return data.sort(function(a, b) {
      var va = getSortVal(a, state.sortKey);
      var vb = getSortVal(b, state.sortKey);
      if (typeof va === 'string') return dir * va.localeCompare(vb);
      return dir * (va - vb);
    });
  }

  // --- Overhead class ---
  function overheadClass(pct) {
    if (pct < 5) return 'overhead-green';
    if (pct <= 15) return 'overhead-yellow';
    return 'overhead-red';
  }

  // --- Format helpers ---
  function toGbps(mbps) { return (mbps / 1000).toFixed(2); }
  function fmtNum(n, dec) { return Number(n).toFixed(dec !== undefined ? dec : 0); }

  // --- Render table ---
  function renderTable() {
    var data = sortData(getFilteredData());
    var tbody = document.getElementById('tableBody');
    var html = '';

    data.forEach(function(d, i) {
      var vcpus = getVCPUs(d.instance_type);
      var bBW = d.baseline_tcp.summary.bandwidth_mbps_avg;
      var tBW = d.tailscale_tcp.summary.bandwidth_mbps_avg;
      var bBarW = (bBW / maxBW * 85).toFixed(1);
      var tBarW = (tBW / maxBW * 85).toFixed(1);
      var oc = overheadClass(d.overhead.bandwidth_pct);
      var isOpen = state.expanded === d.instance_type;

      html += '<tr data-instance="' + d.instance_type + '" class="data-row">';
      html += '<td><span class="instance-type">' + d.instance_type + '</span><span class="instance-family-tag">' + d.instance_family.toUpperCase() + '</span></td>';
      html += '<td class="mono">' + vcpus + '</td>';
      html += '<td class="mono bw-cell"><div class="bw-bar baseline" style="width:' + bBarW + '%"></div><span class="bw-val">' + toGbps(bBW) + ' <small style="color:var(--text-muted)">Gbps</small></span></td>';
      html += '<td class="mono bw-cell"><div class="bw-bar tailscale" style="width:' + tBarW + '%"></div><span class="bw-val">' + toGbps(tBW) + ' <small style="color:var(--text-muted)">Gbps</small></span></td>';
      html += '<td><span class="overhead-badge ' + oc + '">' + d.overhead.bandwidth_pct.toFixed(1) + '%</span></td>';
      html += '<td class="mono">' + fmtNum(d.baseline_tcp.summary.retransmits_avg, 1) + '</td>';
      html += '<td class="mono">' + fmtNum(d.tailscale_tcp.summary.retransmits_avg, 1) + '</td>';
      html += '<td><button class="btn-details" data-instance="' + d.instance_type + '">' + (isOpen ? 'Close' : 'Details') + '</button></td>';
      html += '</tr>';

      // Detail row
      html += '<tr class="detail-row' + (isOpen ? ' open' : '') + '" data-detail="' + d.instance_type + '">';
      html += '<td colspan="8"><div class="detail-content">';
      html += renderDetail(d);
      html += '</div></td></tr>';
    });

    tbody.innerHTML = html;

    // bind events
    document.querySelectorAll('.data-row').forEach(function(row) {
      row.addEventListener('click', function(e) {
        if (e.target.closest('.btn-details')) return;
        toggleDetail(this.getAttribute('data-instance'));
      });
    });
    document.querySelectorAll('.btn-details').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleDetail(this.getAttribute('data-instance'));
      });
    });
  }

  function toggleDetail(instanceType) {
    state.expanded = state.expanded === instanceType ? null : instanceType;
    renderTable();
  }

  function renderDetail(d) {
    var html = '';

    // Meta
    html += '<div class="detail-meta">';
    html += '<div class="detail-meta-item"><strong>Date:</strong> ' + d.date + '</div>';
    html += '<div class="detail-meta-item"><strong>Tailscale:</strong> v' + d.tailscale_version + '</div>';
    html += '<div class="detail-meta-item"><strong>Region:</strong> ' + d.region + ' (' + d.zone + ')</div>';
    html += '<div class="detail-meta-item"><strong>iperf3:</strong> ' + d.test_config.iperf_parallel_streams + ' streams, ' + d.test_config.iperf_duration_sec + 's, ' + d.test_config.iperf_iterations + ' runs</div>';
    html += '<div class="detail-meta-item"><strong>MTR:</strong> ' + d.test_config.mtr_cycles + ' cycles</div>';
    html += '</div>';

    html += '<div class="detail-grid">';

    // iperf runs
    html += '<div class="detail-section">';
    html += '<h4>iperf3 Per-Run Results</h4>';
    html += '<table class="mini-table"><thead><tr><th>Run</th><th>Mode</th><th>BW (Gbps)</th><th>Retrans</th><th>Bytes</th></tr></thead><tbody>';
    d.baseline_tcp.runs.forEach(function(r, i) {
      html += '<tr><td>#' + (i + 1) + '</td><td>Baseline</td><td>' + toGbps(r.bandwidth_mbps) + '</td><td>' + r.retransmits + '</td><td>' + (r.bytes_transferred / 1073741824).toFixed(1) + ' GB</td></tr>';
    });
    d.tailscale_tcp.runs.forEach(function(r, i) {
      html += '<tr><td>#' + (i + 1) + '</td><td>Tailscale</td><td>' + toGbps(r.bandwidth_mbps) + '</td><td>' + r.retransmits + '</td><td>' + (r.bytes_transferred / 1073741824).toFixed(1) + ' GB</td></tr>';
    });
    html += '</tbody></table>';
    html += '</div>';

    // MTR comparison
    html += '<div class="detail-section">';
    html += '<h4>MTR Hop-by-Hop Latency</h4>';
    html += '<div class="mtr-comparison">';

    // find max latency for bar scaling
    var maxLat = 0;
    (d.baseline_mtr.hops || []).forEach(function(h) { if (h.avg_ms > maxLat) maxLat = h.avg_ms; });
    (d.tailscale_mtr.hops || []).forEach(function(h) { if (h.avg_ms > maxLat) maxLat = h.avg_ms; });

    // Baseline column
    html += '<div class="mtr-column"><h5>Baseline &mdash; ' + d.baseline_mtr.target_ip + '</h5>';
    (d.baseline_mtr.hops || []).forEach(function(h) {
      var barW = (h.avg_ms / maxLat * 80).toFixed(1);
      html += '<div class="mtr-hop"><span class="mtr-hop-num">' + h.hop + '</span><span class="mtr-hop-host">' + h.host + '</span><div class="mtr-hop-bar-wrap"><div class="mtr-hop-bar baseline-bar" style="width:' + barW + '%"></div></div><span class="mtr-hop-val">' + h.avg_ms.toFixed(2) + ' ms</span></div>';
    });
    html += '</div>';

    // Tailscale column
    html += '<div class="mtr-column"><h5>Tailscale &mdash; ' + d.tailscale_mtr.target_ip + '</h5>';
    (d.tailscale_mtr.hops || []).forEach(function(h) {
      var barW = (h.avg_ms / maxLat * 80).toFixed(1);
      html += '<div class="mtr-hop"><span class="mtr-hop-num">' + h.hop + '</span><span class="mtr-hop-host">' + h.host + '</span><div class="mtr-hop-bar-wrap"><div class="mtr-hop-bar ts-bar" style="width:' + barW + '%"></div></div><span class="mtr-hop-val">' + h.avg_ms.toFixed(2) + ' ms</span></div>';
    });
    html += '</div>';

    html += '</div></div>';
    html += '</div>';

    return html;
  }

  // --- Sort header binding ---
  function bindSortHeaders() {
    document.querySelectorAll('#mainTable thead th[data-sort]').forEach(function(th) {
      var key = th.getAttribute('data-sort');
      if (!key) return;
      // update visual
      if (key === state.sortKey) {
        th.classList.add('sorted');
        th.querySelector('.sort-arrow').innerHTML = state.sortDir === 'asc' ? '&#9650;' : '&#9660;';
      }
      th.addEventListener('click', function() {
        if (state.sortKey === key) {
          state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = key;
          state.sortDir = 'asc';
        }
        writeHash();
        render();
      });
    });
  }

  function updateSortVisuals() {
    document.querySelectorAll('#mainTable thead th[data-sort]').forEach(function(th) {
      var key = th.getAttribute('data-sort');
      th.classList.remove('sorted');
      th.querySelector('.sort-arrow').innerHTML = '&#9650;';
      if (key === state.sortKey) {
        th.classList.add('sorted');
        th.querySelector('.sort-arrow').innerHTML = state.sortDir === 'asc' ? '&#9650;' : '&#9660;';
      }
    });
  }

  // --- Full render ---
  function render() {
    renderStats();
    renderFilters();
    renderTable();
    updateSortVisuals();
  }

  // Init
  render();
  bindSortHeaders();

  // Hash change listener
  window.addEventListener('hashchange', function() {
    readHash();
    render();
  });
})();
</script>
</body>
</html>
