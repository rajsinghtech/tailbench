<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tailbench — Tailscale Network Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0e;
  --bg-card: #141416;
  --bg-card-hover: #1a1a1e;
  --bg-inset: #0a0a0c;
  --border: #2a2a2e;
  --border-hover: #3a3a3e;
  --text: #e8e6e3;
  --text-2: #9a9896;
  --text-3: #5a5856;
  --accent: #6e8cef;
  --accent-dim: rgba(110,140,239,0.12);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.12);
  --yellow: #facc15;
  --yellow-dim: rgba(250,204,21,0.1);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.1);
  --purple: #c084fc;
  --purple-dim: rgba(192,132,252,0.1);
  --pink: #f472b6;
  --teal: #2dd4bf;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --radius: 10px;
}
[data-theme="light"] {
  --bg: #f4f3f1;
  --bg-card: #ffffff;
  --bg-card-hover: #fafaf8;
  --bg-inset: #eae9e6;
  --border: #d8d6d2;
  --border-hover: #c0beb8;
  --text: #1a1918;
  --text-2: #6b6966;
  --text-3: #a8a6a2;
  --accent: #4b6bd4;
  --accent-dim: rgba(75,107,212,0.08);
  --green: #16a34a;
  --green-dim: rgba(22,163,74,0.08);
  --yellow: #ca8a04;
  --yellow-dim: rgba(202,138,4,0.08);
  --red: #dc2626;
  --red-dim: rgba(220,38,38,0.08);
  --purple: #9333ea;
  --purple-dim: rgba(147,51,234,0.08);
  --pink: #db2777;
  --teal: #0d9488;
}

html { font-size: 15px; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.wrap { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

/* Header */
header {
  padding: 28px 0 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header h1 {
  font-family: var(--mono);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
header h1 span { color: var(--accent); }
header p { font-size: 0.8rem; color: var(--text-2); margin-top: 2px; }
.theme-btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  transition: all 150ms;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Filters */
.filters {
  display: flex;
  gap: 16px;
  padding: 16px 0;
  flex-wrap: wrap;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-group label {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);
}
.chip {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  transition: all 150ms;
}
.chip:hover { border-color: var(--text-2); color: var(--text); }
.chip.on {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* Stats strip */
.stats {
  display: flex;
  gap: 24px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.stat {
  flex-shrink: 0;
}
.stat-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);
}
.stat-val {
  font-family: var(--mono);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  margin-top: 2px;
}
.stat-val small { font-size: 0.65rem; font-weight: 500; color: var(--text-3); margin-left: 2px; }
.stat-sub { font-size: 0.72rem; color: var(--text-2); margin-top: 1px; }

/* Instance cards */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 12px;
  padding: 20px 0 40px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 200ms, box-shadow 200ms;
}
.card:hover {
  border-color: var(--border-hover);
  box-shadow: 0 2px 20px rgba(0,0,0,0.15);
}
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.card-title {
  font-family: var(--mono);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text);
}
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.tag {
  font-family: var(--mono);
  font-size: 0.55rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 2px 6px;
  border-radius: 4px;
}
.tag-provider { background: var(--accent-dim); color: var(--accent); }
.tag-env-vm { background: var(--green-dim); color: var(--green); }
.tag-env-ctr { background: var(--purple-dim); color: var(--purple); }
.tag-family { background: var(--bg-inset); color: var(--text-3); }
.card-vcpu {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-3);
  white-space: nowrap;
}

/* Mode rows inside card */
.mode-rows { padding: 6px 0; }
.mode-row {
  display: grid;
  grid-template-columns: 110px 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 6px 16px;
  transition: background 100ms;
}
.mode-row:hover { background: var(--bg-card-hover); }
.mode-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}
.mode-label.l4 { color: var(--accent); }
.mode-label.l7 { color: var(--purple); }
.mode-label.lb { color: var(--teal); }

/* Metric bar for iperf */
.metric-bar {
  height: 20px;
  border-radius: 4px;
  background: var(--bg-inset);
  position: relative;
  overflow: hidden;
}
.metric-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 400ms ease;
}
.metric-bar-fill.baseline { background: var(--accent); opacity: 0.25; }
.metric-bar-fill.tailscale {
  background: var(--accent);
  opacity: 0.6;
  position: absolute;
  top: 0;
  left: 0;
}
.metric-bar-text {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text);
  z-index: 1;
}

/* Fortio metrics inline */
.fortio-metrics {
  display: flex;
  gap: 12px;
  align-items: center;
  flex: 1;
}
.fm {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text);
}
.fm small { font-size: 0.58rem; font-weight: 500; color: var(--text-3); margin-left: 2px; }

/* Overhead badge */
.oh {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
}
.oh-g { background: var(--green-dim); color: var(--green); }
.oh-y { background: var(--yellow-dim); color: var(--yellow); }
.oh-r { background: var(--red-dim); color: var(--red); }

/* Detail panel (toggle) */
.card-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 300ms ease;
  background: var(--bg-inset);
  border-top: 1px solid var(--border);
}
.card.open .card-detail {
  max-height: 600px;
  padding: 14px 16px;
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.detail-section h5 {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-3);
  margin-bottom: 8px;
}
.mini-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.68rem;
}
.mini-table th {
  text-align: left;
  padding: 4px 6px;
  font-size: 0.58rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-3);
  border-bottom: 1px solid var(--border);
}
.mini-table td {
  padding: 4px 6px;
  color: var(--text-2);
  border-bottom: 1px solid var(--border);
}
.mini-table tr:last-child td { border-bottom: none; }

.meta-line {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-3);
  margin-top: 8px;
}
.meta-line strong { color: var(--text-2); font-weight: 600; }

footer {
  border-top: 1px solid var(--border);
  padding: 20px 0;
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-3);
}
footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }

@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  .stats { flex-wrap: wrap; }
}
@media (max-width: 600px) {
  html { font-size: 14px; }
  .wrap { padding: 0 16px; }
  .mode-row { grid-template-columns: 90px 1fr auto; }
}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <h1>tail<span>bench</span></h1>
      <p>Tailscale network performance across clouds, modes, and layers</p>
    </div>
    <button class="theme-btn" id="themeToggle">theme</button>
  </header>

  <div class="filters" id="filters"></div>
  <div class="stats" id="stats"></div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  <div class="wrap">
    tailbench &mdash; <a href="https://github.com/rajsinghtech/tailbench" target="_blank" rel="noopener">github</a>
  </div>
</footer>

<script src="data.generated.js"></script>
<script>
(function() {
  // --- State ---
  var state = { provider: 'all', family: 'all', env: 'all', expanded: null };

  // --- Theme ---
  var theme = localStorage.getItem('tb-theme') || 'dark';
  function applyTheme() {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeToggle').textContent = theme;
  }
  applyTheme();
  document.getElementById('themeToggle').addEventListener('click', function() {
    theme = theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('tb-theme', theme);
    applyTheme();
  });

  // --- Data grouping ---
  // Group entries by instance+provider+environment into "instance groups"
  // Each group has multiple modes with their results
  function groupData() {
    var map = {};
    TAILBENCH_DATA.forEach(function(d) {
      var key = d.instance_type + '|' + (d.cloud_provider || 'gcp') + '|' + (d.environment || 'vm');
      if (!map[key]) {
        map[key] = {
          instance_type: d.instance_type,
          instance_family: d.instance_family,
          cloud_provider: d.cloud_provider || 'gcp',
          environment: d.environment || 'vm',
          vcpus: d.vcpus || 0,
          region: d.region,
          zone: d.zone,
          tailscale_version: d.tailscale_version,
          date: d.date,
          modes: {}
        };
      }
      var mode = d.transport_mode || 'l4-kernel';
      map[key].modes[mode] = d;
      // Fill vcpus from any entry that has it
      if (d.vcpus && !map[key].vcpus) map[key].vcpus = d.vcpus;
      if (d.tailscale_version && !map[key].tailscale_version) map[key].tailscale_version = d.tailscale_version;
      if (d.date && !map[key].date) map[key].date = d.date;
    });
    return Object.values(map);
  }

  var allGroups = groupData();

  // --- Detect available filters ---
  var providers = {};
  var families = {};
  var envs = {};
  allGroups.forEach(function(g) {
    providers[g.cloud_provider.toUpperCase()] = true;
    families[g.instance_family.toUpperCase()] = true;
    envs[g.environment] = true;
  });

  // --- Max BW for bar scaling ---
  var maxBW = 0;
  TAILBENCH_DATA.forEach(function(d) {
    if (d.baseline_tcp) {
      var b = d.baseline_tcp.summary.bandwidth_mbps_avg;
      if (b > maxBW) maxBW = b;
    }
  });

  // --- vCPU resolver ---
  function getVCPUs(g) {
    if (g.vcpus) return g.vcpus;
    var m = g.instance_type.match(/(\d+)$/);
    if (m) return parseInt(m[1], 10);
    var awsSize = g.instance_type.split('.')[1];
    if (awsSize) {
      var map = {medium:1,large:2,xlarge:4,'2xlarge':8,'4xlarge':16,'8xlarge':32,'12xlarge':48,'16xlarge':64,'24xlarge':96};
      if (map[awsSize]) return map[awsSize];
    }
    return 0;
  }

  // --- Filtering ---
  function getFiltered() {
    return allGroups.filter(function(g) {
      if (state.provider !== 'all' && g.cloud_provider.toLowerCase() !== state.provider) return false;
      if (state.family !== 'all' && g.instance_family.toLowerCase() !== state.family) return false;
      if (state.env !== 'all' && g.environment !== state.env) return false;
      return true;
    });
  }

  // --- Helpers ---
  function toGbps(mbps) { return (mbps / 1000).toFixed(2); }
  function fmtQPS(qps) { return qps >= 10000 ? (qps/1000).toFixed(1) + 'k' : qps >= 1000 ? (qps/1000).toFixed(1) + 'k' : qps.toFixed(0); }
  function ohClass(pct) { return pct < 5 ? 'oh-g' : pct <= 15 ? 'oh-y' : 'oh-r'; }

  // --- Render filters ---
  function renderFilters() {
    var html = '';

    if (Object.keys(providers).length > 1) {
      html += '<div class="filter-group"><label>Provider</label>';
      html += '<button class="chip' + (state.provider === 'all' ? ' on' : '') + '" data-f="provider" data-v="all">All</button>';
      Object.keys(providers).sort().forEach(function(p) {
        html += '<button class="chip' + (state.provider === p.toLowerCase() ? ' on' : '') + '" data-f="provider" data-v="' + p.toLowerCase() + '">' + p + '</button>';
      });
      html += '</div>';
    }

    if (Object.keys(families).length > 1) {
      html += '<div class="filter-group"><label>Family</label>';
      html += '<button class="chip' + (state.family === 'all' ? ' on' : '') + '" data-f="family" data-v="all">All</button>';
      Object.keys(families).sort().forEach(function(f) {
        html += '<button class="chip' + (state.family === f.toLowerCase() ? ' on' : '') + '" data-f="family" data-v="' + f.toLowerCase() + '">' + f + '</button>';
      });
      html += '</div>';
    }

    if (Object.keys(envs).length > 1) {
      html += '<div class="filter-group"><label>Env</label>';
      html += '<button class="chip' + (state.env === 'all' ? ' on' : '') + '" data-f="env" data-v="all">All</button>';
      if (envs.vm) html += '<button class="chip' + (state.env === 'vm' ? ' on' : '') + '" data-f="env" data-v="vm">VM</button>';
      if (envs.container) html += '<button class="chip' + (state.env === 'container' ? ' on' : '') + '" data-f="env" data-v="container">K8s</button>';
      html += '</div>';
    }

    document.getElementById('filters').innerHTML = html;
    document.querySelectorAll('.chip').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var f = this.getAttribute('data-f');
        var v = this.getAttribute('data-v');
        state[f] = v;
        state.expanded = null;
        render();
      });
    });
  }

  // --- Render stats ---
  function renderStats() {
    var groups = getFiltered();
    var allEntries = [];
    groups.forEach(function(g) { Object.values(g.modes).forEach(function(d) { allEntries.push(d); }); });

    var iperfEntries = allEntries.filter(function(d) { return d.overhead; });
    var fortioEntries = allEntries.filter(function(d) { return d.fortio_result; });

    var html = '<div class="stat"><div class="stat-label">Instances</div><div class="stat-val">' + groups.length + '</div><div class="stat-sub">' + allEntries.length + ' total benchmarks</div></div>';

    if (iperfEntries.length > 0) {
      var avgOH = iperfEntries.reduce(function(s, d) { return s + d.overhead.bandwidth_pct; }, 0) / iperfEntries.length;
      html += '<div class="stat"><div class="stat-label">L4 Avg Overhead</div><div class="stat-val">' + avgOH.toFixed(1) + '<small>%</small></div><div class="stat-sub">' + iperfEntries.length + ' iperf3 tests</div></div>';
    }
    if (fortioEntries.length > 0) {
      var avgQPS = fortioEntries.reduce(function(s, d) { return s + d.fortio_result.qps; }, 0) / fortioEntries.length;
      var avgP99 = fortioEntries.reduce(function(s, d) { return s + d.fortio_result.p99_latency_ms; }, 0) / fortioEntries.length;
      html += '<div class="stat"><div class="stat-label">Avg QPS</div><div class="stat-val">' + fmtQPS(avgQPS) + '</div><div class="stat-sub">' + fortioEntries.length + ' HTTP tests</div></div>';
      html += '<div class="stat"><div class="stat-label">Avg P99</div><div class="stat-val">' + avgP99.toFixed(1) + '<small>ms</small></div><div class="stat-sub">fortio latency</div></div>';
    }

    document.getElementById('stats').innerHTML = html;
  }

  // --- Render a mode row ---
  function renderModeRow(mode, d) {
    var modeLabel = mode.replace('l4-', '').replace('l7-', '');
    var modeClass = mode.startsWith('l7') ? 'l7' : mode === 'l4-lb' ? 'lb' : 'l4';
    var html = '<div class="mode-row">';
    html += '<div class="mode-label ' + modeClass + '">' + modeLabel + '</div>';

    if (d.baseline_tcp && d.tailscale_tcp) {
      // iperf mode — show bandwidth bar
      var bBW = d.baseline_tcp.summary.bandwidth_mbps_avg;
      var tBW = d.tailscale_tcp.summary.bandwidth_mbps_avg;
      var bW = maxBW ? (bBW / maxBW * 100).toFixed(1) : 0;
      var tW = maxBW ? (tBW / maxBW * 100).toFixed(1) : 0;
      html += '<div class="metric-bar">';
      html += '<div class="metric-bar-fill baseline" style="width:' + bW + '%"></div>';
      html += '<div class="metric-bar-fill tailscale" style="width:' + tW + '%"></div>';
      html += '<div class="metric-bar-text">' + toGbps(tBW) + ' / ' + toGbps(bBW) + ' Gbps</div>';
      html += '</div>';
      if (d.overhead) {
        html += '<span class="oh ' + ohClass(d.overhead.bandwidth_pct) + '">' + d.overhead.bandwidth_pct.toFixed(1) + '%</span>';
      }
    } else if (d.fortio_result) {
      // fortio mode — show QPS + latency
      var fr = d.fortio_result;
      html += '<div class="fortio-metrics">';
      html += '<div class="fm">' + fmtQPS(fr.qps) + '<small>qps</small></div>';
      html += '<div class="fm">' + fr.p50_latency_ms.toFixed(1) + '<small>ms p50</small></div>';
      html += '<div class="fm">' + fr.p99_latency_ms.toFixed(1) + '<small>ms p99</small></div>';
      html += '</div>';
      if (d.l7_overhead) {
        var delta = d.l7_overhead.qps.delta_pct;
        html += '<span class="oh ' + ohClass(Math.abs(delta)) + '">' + delta.toFixed(0) + '%</span>';
      }
    }

    html += '</div>';
    return html;
  }

  // --- Render card ---
  function renderCard(g) {
    var key = g.instance_type + '|' + g.cloud_provider + '|' + g.environment;
    var isOpen = state.expanded === key;
    var vcpus = getVCPUs(g);

    var html = '<div class="card' + (isOpen ? ' open' : '') + '" data-key="' + key + '">';
    html += '<div class="card-head">';
    html += '<div><div class="card-title">' + g.instance_type + '</div>';
    html += '<div class="card-tags">';
    html += '<span class="tag tag-provider">' + g.cloud_provider.toUpperCase() + '</span>';
    html += '<span class="tag ' + (g.environment === 'container' ? 'tag-env-ctr' : 'tag-env-vm') + '">' + (g.environment === 'container' ? 'K8s' : 'VM') + '</span>';
    html += '<span class="tag tag-family">' + g.instance_family.toUpperCase() + '</span>';
    html += '</div></div>';
    html += '<div class="card-vcpu">' + vcpus + ' vCPU</div>';
    html += '</div>';

    // Mode rows — sorted: l4-kernel first, then l4-lb, then l7s
    var modeOrder = ['l4-kernel', 'l4-userspace', 'l4-lb', 'l7-serve-h1', 'l7-serve-h2', 'l7-ingress-h1', 'l7-ingress-h2'];
    html += '<div class="mode-rows">';
    modeOrder.forEach(function(mode) {
      if (g.modes[mode]) {
        html += renderModeRow(mode, g.modes[mode]);
      }
    });
    // Any modes not in the predefined order
    Object.keys(g.modes).forEach(function(mode) {
      if (modeOrder.indexOf(mode) === -1) {
        html += renderModeRow(mode, g.modes[mode]);
      }
    });
    html += '</div>';

    // Detail panel
    html += '<div class="card-detail">';
    var firstEntry = Object.values(g.modes)[0];
    html += '<div class="meta-line">';
    if (g.date) html += '<strong>Date:</strong> ' + g.date + ' &nbsp; ';
    if (g.tailscale_version) html += '<strong>TS:</strong> v' + g.tailscale_version + ' &nbsp; ';
    if (g.region) html += '<strong>Region:</strong> ' + g.region + ' &nbsp; ';
    html += '</div>';

    // iperf detail if available
    var iperfEntry = g.modes['l4-kernel'] || g.modes['l4-userspace'];
    if (iperfEntry && iperfEntry.baseline_tcp) {
      html += '<div class="detail-grid" style="margin-top:10px">';
      html += '<div class="detail-section"><h5>iperf3 runs</h5>';
      html += '<table class="mini-table"><thead><tr><th>Run</th><th>Mode</th><th>BW (Gbps)</th><th>Retrans</th></tr></thead><tbody>';
      iperfEntry.baseline_tcp.runs.forEach(function(r, i) {
        html += '<tr><td>#' + (i+1) + '</td><td>Baseline</td><td>' + toGbps(r.bandwidth_mbps) + '</td><td>' + r.retransmits + '</td></tr>';
      });
      iperfEntry.tailscale_tcp.runs.forEach(function(r, i) {
        html += '<tr><td>#' + (i+1) + '</td><td>Tailscale</td><td>' + toGbps(r.bandwidth_mbps) + '</td><td>' + r.retransmits + '</td></tr>';
      });
      html += '</tbody></table></div>';

      // MTR
      if (iperfEntry.baseline_mtr && iperfEntry.baseline_mtr.hops && iperfEntry.baseline_mtr.hops.length > 0) {
        html += '<div class="detail-section"><h5>MTR hops</h5>';
        html += '<table class="mini-table"><thead><tr><th>#</th><th>Host</th><th>Avg</th></tr></thead><tbody>';
        iperfEntry.tailscale_mtr.hops.forEach(function(h) {
          html += '<tr><td>' + h.hop + '</td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis">' + h.host + '</td><td>' + h.avg_ms.toFixed(2) + 'ms</td></tr>';
        });
        html += '</tbody></table></div>';
      }
      html += '</div>';
    }

    // Fortio detail if available
    var fortioEntries = Object.entries(g.modes).filter(function(e) { return e[1].fortio_result; });
    if (fortioEntries.length > 0) {
      html += '<div style="margin-top:10px"><div class="detail-section"><h5>HTTP performance</h5>';
      html += '<table class="mini-table"><thead><tr><th>Mode</th><th>QPS</th><th>P50</th><th>P99</th><th>P99.9</th><th>Errors</th></tr></thead><tbody>';
      fortioEntries.forEach(function(e) {
        var mode = e[0], fr = e[1].fortio_result;
        html += '<tr><td>' + mode + '</td><td>' + fmtQPS(fr.qps) + '</td><td>' + fr.p50_latency_ms.toFixed(2) + 'ms</td><td>' + fr.p99_latency_ms.toFixed(2) + 'ms</td><td>' + fr.p999_latency_ms.toFixed(2) + 'ms</td><td>' + fr.connection_errors + '</td></tr>';
      });
      html += '</tbody></table></div></div>';
    }

    // System config
    if (iperfEntry && iperfEntry.system_config) {
      var sc = iperfEntry.system_config;
      html += '<div class="meta-line" style="margin-top:8px">';
      html += '<strong>CC:</strong> ' + sc.tcp_congestion_control + ' &nbsp; ';
      html += '<strong>Gov:</strong> ' + sc.cpu_governor + ' &nbsp; ';
      html += '<strong>MTU:</strong> ' + sc.mtu_tailscale + '/' + sc.mtu_underlay + ' &nbsp; ';
      if (sc.kernel_full) html += '<strong>Kernel:</strong> ' + sc.kernel_full;
      html += '</div>';
    }

    html += '</div>'; // card-detail
    html += '</div>'; // card
    return html;
  }

  // --- Render grid ---
  function renderGrid() {
    var groups = getFiltered();
    // Sort by vcpus then instance type
    groups.sort(function(a, b) {
      var av = getVCPUs(a), bv = getVCPUs(b);
      if (av !== bv) return av - bv;
      return a.instance_type.localeCompare(b.instance_type);
    });
    var html = '';
    groups.forEach(function(g) { html += renderCard(g); });
    if (groups.length === 0) {
      html = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-3);font-family:var(--mono)">No results match filters</div>';
    }
    document.getElementById('grid').innerHTML = html;

    // Card click to expand
    document.querySelectorAll('.card').forEach(function(card) {
      card.addEventListener('click', function() {
        var key = this.getAttribute('data-key');
        state.expanded = state.expanded === key ? null : key;
        renderGrid();
      });
    });
  }

  // --- Full render ---
  function render() {
    renderFilters();
    renderStats();
    renderGrid();
  }

  render();
})();
</script>
</body>
</html>
