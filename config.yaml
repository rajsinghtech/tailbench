# tailbench configuration
# Secrets are loaded from env_file, referenced via ${VAR} syntax

env_file: .env  # sources OAUTH_CLIENT_ID, OAUTH_CLIENT_SECRET

providers: [gcp, aws, azure, gke, eks, aks]
family: all
filter: ""

tailscale:
  create_tailnet: true
  oauth_client_id: ${OAUTH_CLIENT_ID}
  oauth_client_secret: ${OAUTH_CLIENT_SECRET}
  tag: tag:bench

benchmark:
  iperf_duration: 30
  iperf_parallel: 4
  iperf_iterations: 3
  mtr_cycles: 100
  cooldown_sec: 30

ssh:
  timeout: 120
  ready_timeout: 300

aws:
  region: us-west-2
  az: us-west-2a
  key_name: raj_macbook

gcp:
  project: tailscale-sandbox
  zone: us-central1-a

azure:
  location: eastus
  resource_group: tailbench-rg

images:
  bench: ghcr.io/rajsinghtech/tailbench-tools:latest
  tailscale: ghcr.io/tailscale/tailscale:latest

cleanup_networking: false
dry_run: false
